- id: OPT-001
  area: drawBrightnessGrid preserve fast path
  priority: P0
  status: queued
  files:
  - src/index.html
  hypothesis: "Preserve color mode (no fog) at src/index.html:2398 still calls\n`text(ch, cx, cy)` per cell \u2014 ~57 ms at 240\xD7120. The other three\nfast color modes already use sprite atlases (mono / duotone / gradient).\nBuild an alpha-only sprite atlas for the ramp + a per-cell solid\nfillStyle from `_sampleObj.r/g/b`, then composite via 'source-over'.\n"
  expected_gain_ms: -30 to -45 on cfg-preserve-stress (and downstream wins when fog overlay lands)
  benchmark_first: true
  risks: "`globalCompositeOperation` toggle cost varies by browser. Validate\nthe toggle-pair cost on a 100\xD7100 dummy loop microbenchmark before\ncommitting. Composite-op churn could exceed `fillText` baseline on\nsome hardware.\n"
  code_shape: "if (colorMode === 'preserve' && !depthFogActive) {\n  const sprite = _ensurePreserveSprite(ramp, fontFamily, fontSize);\n  const ctx = drawingContext;\n  for (let r = 0; r < rows; r++) {\n    for (let c = 0; c < cols; c++) {\n      const i = r*cols+c;\n      if (spaceMask[i]) continue;\n      sampleCellInto(_sampleObj, pixels, stride, x0, y0, cellPxW, cellPxH, srcW, srcH);\n      ctx.fillStyle = `rgb(${_sampleObj.r|0},${_sampleObj.g|0},${_sampleObj.b|0})`;\n      ctx.fillRect(cx, cy, tileW, tileH);\n      ctx.globalCompositeOperation = 'destination-in';\n      ctx.drawImage(sprite, idx*tileW, 0, tileW, tileH, cx, cy, tileW, tileH);\n      ctx.globalCompositeOperation = 'source-over';\n    }\n  }\n  return;\n}\n"
- id: OPT-002
  area: depthFog overlay pass
  priority: P0
  status: queued
  files:
  - src/index.html
  hypothesis: "`depthFog` at lines 2142, 2485, 2668 forces all color modes\n(including monochrome) into the slow preserve path via the\n`needsSample` gate \u2014 penalty ~30 ms. The fog operation is per-cell\n`r = r*(1-tf) + fogR*tf`, an output-space tint that doesn't require\nper-pixel sampling. Decouple by computing the cellDepth \u2192 fogTint\noverlay once per frame and blending via drawImage 'multiply'.\n"
  expected_gain_ms: -25 to -30 when fog is enabled
  benchmark_first: false
  risks: "Pixel parity. Slow path lerps in display-output space pre-fog; if\nthe new overlay diverges (fog applied after monochrome alpha\nmultiplies the *char*, not the bg), \u0394E may spike. Gate behind\n`CONFIG.depthFogPath: 'overlay' | 'inline'` for safe rollout.\n"
  code_shape: "// After the fast-path return:\nif (depthFogActive) _applyDepthFogOverlay(ctx, cellDepth, cols, rows, cellW, cellH, fog);\n\nfunction _applyDepthFogOverlay(ctx, cellDepth, cols, rows, cellW, cellH, fog) {\n  const overlay = _ensureFogOverlay(cols, rows, cellW, cellH, fog);\n  const id = overlay.imgData; const d = id.data;\n  for (let i = 0, n = cols*rows; i < n; i++) {\n    const tf = computeFogT(cellDepth[i], fog);\n    const k = i*4; d[k]=fog.r; d[k+1]=fog.g; d[k+2]=fog.b;\n    d[k+3] = (tf*255)|0;\n  }\n  overlay.ctx.putImageData(id, 0, 0);\n  ctx.drawImage(overlay.canvas, 0, 0, ctx.canvas.width, ctx.canvas.height);\n}\n"
