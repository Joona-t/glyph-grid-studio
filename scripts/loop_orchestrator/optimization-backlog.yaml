- id: OPT-003
  area: postprocess gate
  priority: P0
  status: queued
  files:
  - src/index.html
  hypothesis: '`_hasImgDataStages` (src/index.html:2886) only checks `enabled`,

    never `intensity > 0`. A user with `bloom: { enabled: true, strength: 0 }`

    pays the full ~5 ms getImageData/putImageData round-trip plus the

    inner stage cost. Tighten the gate by requiring at least one

    intensity-bearing field to be > epsilon (mirroring the

    `_stageActive` helper in glyph-compat.js:68-77).

    '
  expected_gain_ms: -5 to -12
  benchmark_first: false
  risks: 'Negligible; pixel-identical when stage was already a no-op.

    '
  code_shape: "function _hasImgDataStages(p) {\n  if (!p) return false;\n  function _on(s, ks) { if (!s || !s.enabled) return false;\n    for (const k of ks) if ((s[k] || 0) > 0.001) return true; return false; }\n  return _on(p.phosphorDecay, ['decay']) ||\n         _on(p.crtBeam, ['intensity']) ||\n         _on(p.halation, ['intensity', 'strength']) ||\n         _on(p.bloom, ['intensity', 'strength']) ||\n         _on(p.godRays, ['strength', 'intensity']) ||\n         _on(p.scanlines, ['intensity', 'strength']) ||\n         _on(p.chromaticAberration, ['amount']) ||\n         _on(p.barrel, ['amount']) ||\n         _on(p.kawaii, ['intensity']);\n}\n"
  prior_attempt: Re-queued 2026-05-10 after first 24-h pursuit died on parser bug + reset-wipe (BUG-024). patch_runner.py now extracts diff permissively and embeds inline source excerpts; no --dangerously-skip-permissions.
- id: OPT-004
  area: postprocess scratch buffers
  priority: P0
  status: queued
  files:
  - src/lib/glyph-crt.js
  hypothesis: "`boxBlurLinear` at glyph-crt.js:85-87 allocates two\n`Float32Array(N*3)` per call. At 1024\xD7504 that's 6.2 MB \xD7 2 per call\n\xD7 2 stages (bloom + halation) = ~25 MB allocated per frame when\nthose stages are on. Persist module-scope scratch buffers, grow only\nwhen N increases.\n"
  expected_gain_ms: -4 to -8 steady + GC pause smoothing
  benchmark_first: false
  risks: "JS is single-threaded and `applyChain` is sequential \u2014 no aliasing\nrisk. Buffer-growing branch only fires on canvas resize.\n"
  code_shape: "let _bbOut = null, _bbTmp = null;\nfunction boxBlurLinear(src, w, h, radius) {\n  const N = src.length;\n  if (!_bbOut || _bbOut.length < N) {\n    _bbOut = new Float32Array(N);\n    _bbTmp = new Float32Array(N);\n  }\n  const out = _bbOut, tmp = _bbTmp;\n  // existing unchanged below\n}\n"
  prior_attempt: Re-queued 2026-05-10 after first 24-h pursuit died on parser bug + reset-wipe (BUG-024). patch_runner.py now extracts diff permissively and embeds inline source excerpts; no --dangerously-skip-permissions.
