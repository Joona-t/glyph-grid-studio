- id: OPT-012
  area: sprite atlas integer alignment
  priority: P1
  status: queued
  files:
  - src/index.html
  hypothesis: '`tileW = Math.ceil(fontSizePx * 1.1)` (line 1870) yields odd values

    (9 px for fontSize=8). Per-cell `(cx - halfTW) | 0` gives sub-pixel

    drawImage destinations because `cellW = canvas.width / cols` is

    fractional (1024/240 = 4.266). Browsers fall back to bilinear

    sampling on sub-pixel drawImage dst, costing ~25 % more per blit.

    Snap canvas to integer cell widths and floor tile sizes.

    '
  expected_gain_ms: -2 to -6 on monochrome fast path
  benchmark_first: true
  risks: 'Up to 1-2 px residual bar at canvas edge on non-divisible aspect

    ratios. Mitigate by filling bg color in the residual.

    '
  code_shape: 'const cellWint = (canvas.width / cols) | 0;

    const cellHint = (canvas.height / rows) | 0;

    // pad bg fill on right/bottom: cols*cellWint may be < canvas.width

    '
