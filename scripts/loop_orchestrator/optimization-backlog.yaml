- id: OPT-008
  area: vignette overlay strength bucketing
  priority: P2
  status: queued
  files:
  - src/index.html
  hypothesis: "`_ensureVignetteOverlay` (line 2858) caches the gradient canvas but\nrebuilds when `_vignetteOverlay.key` mismatches. During slider\ndrags, this rebuild fires every frame (~80 ms freeze on 1024\xD7504).\nBucket the strength to 11 fixed values (0.0, 0.1, \u2026, 1.0) so drags\nskip the rebuild. Bound the cache at 32 entries.\n"
  expected_gain_ms: 0 ms steady; ~80 ms freeze elimination on drag
  benchmark_first: false
  risks: "Memory bound: 32 entries \xD7 1024\xD7504\xD74 bytes = ~64 MB worst case.\nUse Map+LRU eviction at 8 entries instead if memory is tight.\n"
  code_shape: "const _vigCache = new Map();\nfunction _ensureVignetteOverlay(w, h, strength) {\n  const sBucket = Math.round(strength * 10);\n  const key = `${w}x${h}:${sBucket}`;\n  let entry = _vigCache.get(key);\n  if (entry) return entry;\n  // existing build code, snapped to bucket\n  _vigCache.set(key, { canvas, key });\n  if (_vigCache.size > 8) _vigCache.delete(_vigCache.keys().next().value);\n  return _vigCache.get(key);\n}\n"
