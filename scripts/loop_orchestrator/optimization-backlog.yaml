  hypothesis: "`drawEdgeDirectionalGrid` at src/index.html:2656 has a monochrome fast path\n(lines 2707-2725) that calls `fill(monoR,\
    \ monoG, monoB, a > 255 ? 255 : a)` and\n`text(String.fromCodePoint(cp), cx, cy)` per non-space cell at line 2720.\nEach\
    \ `String.fromCodePoint(cp)` allocates a new string object. Each p5 `fill()`\ncall has function-call overhead. At 28,800\
    \ cells this is 28,800 string allocs +\n28,800 fill() calls per frame when edge-directional mode is active.\n\nThe directional\
    \ alphabet in glyph-edge.js:37-46 (`DEFAULT_ALPHABET`) is a fixed\nset of 5 unique codepoints: 0x2500, 0x2571, 0x2502,\
    \ 0x2572, 0x20. Only 4 of these\nare non-space. A sprite atlas for these 4 codepoints can be built once per\n(fontFamily,\
    \ fontSizePx, inkColor) tuple using the `_ensureRampSprite` pattern from\nsrc/index.html:2065. Replace `fill()+text(String.fromCodePoint(cp))`\
    \ with\n`ctx.globalAlpha=a/255; ctx.drawImage(...)` \u2014 same pattern as drawBrightnessGrid's\nITER-016 win (57ms->9ms,\
    \ 6x faster).\n\nNOTE: none of the 5 bench configs use selectionMode='edge-directional', so bench\ngain is 0 ms. The SSIM\
    \ gate trivially passes since drawEdgeDirectionalGrid is not\ncalled in any bench config. This targets interactive user\
    \ sessions with edge-\ndirectional mode and is a correctness-preserving quality-of-life win.\n"
  expected_gain_ms: 0 on all 5 bench configs; -5 to -12 real-use edge-directional mode
  benchmark_first: false
  risks: 'Rasterization parity: the sprite atlas pre-renders codepoints via ctx.fillText on

    an offscreen canvas. The per-cell path uses p5''s text() which also calls fillText

    internally. Glyph bitmaps should be identical; any difference comes from

    antialiasing context. If SSIM check on edge-directional mode (not in bench suite)

    shows visible drift, escalate rather than revert.

    '
  code_shape: "// In src/index.html, add edge dir sprite cache near line 2064:\nlet _edgeDirSprite = null, _edgeDirKey = null;\n\
    function _ensureEdgeDirSprite(cpArr, fontFamily, fontSizePx, fillColor) {\n  const key = cpArr.join(',') + '|' + fontFamily\
    \ + '|' + fontSizePx + '|' + fillColor;\n  if (_edgeDirKey === key && _edgeDirSprite) return _edgeDirSprite;\n  // ...\
