- id: OPT-020
  area: applyScanlines skip no-op row multiply when darken equals 1
  priority: P1
  status: queued
  files:
  - src/lib/glyph-crt.js
  hypothesis: |
    `applyScanlines` at glyph-crt.js:158 computes `darken` per row at line 163 as
    either the literal 1 (for rows where `(y + phase) % period === 0`) or
    `(1 - intensity)` for all other rows. The inner loop (lines 164-169) runs for every
    row including those where `darken === 1`, executing 3 multiply-and-store operations
    per pixel that are no-ops (x * 1.0 === x for Uint8ClampedArray integer values).

    cfg-postproc-heavy has `scanlines: { enabled: true, period: 2 }` (benchmark.py:117).
    With period=2, exactly 252 of 504 rows have darken===1. Skipping the inner loop
    for those rows saves 252 rows x 1024 pixels x 3 channel operations = 774,144
    no-op multiply-and-stores per frame.

    Fix: add `if (darken === 1) continue;` after line 163, before the inner x-loop.

    Bit-exact argument: for Uint8ClampedArray values 0-255, `x * 1.0` assigned back
    to a Uint8ClampedArray slot produces x unchanged (clamp rounds to same integer).
    Skipping `rgba[i] = rgba[i] * 1.0` leaves rgba[i] unchanged — byte-identical.
    The strict equality `darken === 1` fires only for the literal 1 from the ternary;
    non-integer phase or period=1 edge cases either never fire the skip or make
    applyScanlines correctly a no-op (period=1 means all rows are full-brightness).
  expected_gain_ms: -2 to -5 on cfg-postproc-heavy with period:2; 0 on cfg-default
  benchmark_first: false
  risks: |
    None for bit-exactness. The skip fires only when darken is the literal 1, which
    is a proven no-op for Uint8ClampedArray. No new branches added to any HOT-PATH
    function. The only change is a single continue statement inside applyScanlines.
  code_shape: |
    // In applyScanlines (glyph-crt.js:158), add one line after line 163:
    function applyScanlines(rgba, w, h, opts) {
      const intensity = opts.intensity == null ? 0.25 : opts.intensity;
      const period = Math.max(1, opts.period | 0 || 2);
      const phase = opts.phase || 0;
      for (let y = 0; y < h; y++) {
        const darken = ((y + phase) % period === 0) ? 1 : (1 - intensity);
        if (darken === 1) continue;
        for (let x = 0; x < w; x++) {
          const i = (y * w + x) * 4;
          rgba[i]     = rgba[i]     * darken;
          rgba[i + 1] = rgba[i + 1] * darken;
          rgba[i + 2] = rgba[i + 2] * darken;
        }
      }
      return rgba;
    }

- id: OPT-017
  area: applyChain Object.assign allocation elimination (halation + scanlines opts)
  priority: P1
  status: queued
  files:
  - src/lib/glyph-crt.js
  hypothesis: |
    `applyChain` at glyph-crt.js:327 creates two new plain objects per frame when
    halation and scanlines are enabled. At glyph-crt.js:346:
      `applyBloom(d, w, h, Object.assign({ threshold:0.6, intensity:0.3, radius:4 }, postOpts.halation))`
    creates a merged object every frame to supply halation defaults. At glyph-crt.js:356:
      `applyScanlines(d, w, h, Object.assign({}, postOpts.scanlines, { phase: phase }))`
    creates another object every frame to inject the computed phase value. Both objects
    are throwaway — allocated, passed, and released each frame.

    Fix: replace both `Object.assign` calls with module-scope persistent opts objects
    `_halationOpts` and `_scanlinesOpts` that are mutated in-place before each dispatch.
    The key fields (threshold, intensity, radius for halation; intensity, period, phase
    for scanlines) are set explicitly from postOpts each frame.

    Bit-exact argument: `applyBloom` at lines 127-153 reads opts.threshold, opts.intensity,
    opts.radius only — no field enumeration, no reference retention. `applyScanlines` at
    lines 158-172 reads opts.intensity, opts.period, opts.phase only. A persistent object
    with identical field values produces identical function execution and identical output.
  expected_gain_ms: -0.5 to -1.5 on cfg-postproc-heavy; 0 elsewhere
  benchmark_first: false
  risks: |
    None for bit-exactness. Risk: if caller passes halation/scanlines config with extra
    fields not in the persistent object, those would not be propagated. Audit confirms
    applyBloom and applyScanlines only read the named fields documented above.
  code_shape: |
    // After glyph-crt.js:28 ('use strict'), before srgbToLinear:
    const _halationOpts = { threshold: 0.6, intensity: 0.3, radius: 4 };
    const _scanlinesOpts = { intensity: 0.25, period: 2, phase: 0 };

    // Replace glyph-crt.js:346 (halation dispatch):
    if (postOpts.halation && postOpts.halation.enabled) {
      _halationOpts.threshold = postOpts.halation.threshold != null ? postOpts.halation.threshold : 0.6;
      _halationOpts.intensity = postOpts.halation.intensity != null ? postOpts.halation.intensity : 0.3;
      _halationOpts.radius    = postOpts.halation.radius    != null ? postOpts.halation.radius    : 4;
      applyBloom(d, w, h, _halationOpts);
    }

    // Replace glyph-crt.js:354-356 (scanlines dispatch):
    if (postOpts.scanlines && postOpts.scanlines.enabled) {
      const phase = reduced ? 0 : (postOpts.scanlines.phase || 0);
      _scanlinesOpts.intensity = postOpts.scanlines.intensity != null ? postOpts.scanlines.intensity : 0.25;
      _scanlinesOpts.period    = postOpts.scanlines.period    != null ? (postOpts.scanlines.period | 0) : 2;
      _scanlinesOpts.phase     = phase;
      applyScanlines(d, w, h, _scanlinesOpts);
    }

