# Round 6 hypotheses — OPT-016 through OPT-022.
# Generated 2026-05-11 after deep read of src/index.html (3793 lines),
# src/lib/glyph-crt.js (597 lines), src/lib/glyph-edge.js,
# src/lib/glyph-compat.js, and scripts/loop_orchestrator/benchmark.py.
#
# Primary target: cfg-postproc-heavy (273 ms).
# cfg-postproc-heavy fires: bloom + halation + scanlines + chromaticAberration.
# Each applyBloom call allocates 3x Float32Array(N*3) where N=516096 pixels.
# With bloom + halation = 2 calls: 6 x 6.2 MB = ~37 MB allocated/frame.
# All hypotheses preserve bit-exact pixel output — no sub-perceptual shifts.

- id: OPT-016
  area: boxBlurLinear + applyBloom persistent Float32Array scratch buffers
  priority: P0
  status: queued
  files:
  - src/lib/glyph-crt.js
  hypothesis: |
    `boxBlurLinear` at glyph-crt.js:85 allocates `out = new Float32Array(src.length)`
    at line 86 and `tmp = new Float32Array(src.length)` at line 87 on every call.
    `applyBloom` at glyph-crt.js:127 allocates `lin = new Float32Array(N * 3)` at
    line 132 on every call (N = rgba.length / 4). On cfg-postproc-heavy, `applyChain`
    calls `applyBloom` twice per frame: once for halation at line 346 and once for
    bloom at line 349. Each `applyBloom` call triggers three Float32Array allocations:
    `lin` (line 132), then `out` and `tmp` inside `boxBlurLinear` (lines 86-87).
    At canvas 1024x504, N=516096, N*3=1548288 floats = 6.2 MB per buffer.
    Total: 6 x 6.2 MB = ~37 MB allocated and GC-released per frame.

    Fix: declare three module-scope persistent buffers `_crtBlurOut`, `_crtBlurTmp`,
    `_bloomLinBuf` inside the IIFE at glyph-crt.js after line 28 (`'use strict'`).
    Grow only when the required length exceeds current size (canvas resize, rare).
    In `boxBlurLinear` replace lines 86-87 with reuse of `_crtBlurOut`/`_crtBlurTmp`.
    In `applyBloom` replace line 132 with reuse of `_bloomLinBuf`.

    Bit-exact argument: `_bloomLinBuf` is filled completely at lines 133-143 before
    being passed to `boxBlurLinear`. Inside `boxBlurLinear`, `_crtBlurTmp` is filled
    completely in the horizontal pass (lines 90-106) before being read in the vertical
    pass (lines 107-123), and `_crtBlurOut` is filled completely before return.
    No stale data is ever read. JS is single-threaded; `applyChain` is synchronous.
    The two sequential `applyBloom` calls at lines 346 and 349 share the same
    persistent buffers safely because the first call completes fully before the second
    begins. Output bytes are mathematically identical to the per-call allocation path.

    Note: OPT-004 was rejected with visual_drift_below_0.985 at cycle 1 during the
    pre-parser-fix era (pre-hunk-header-normalization, pre-identifier-grep). The
    infrastructure failures then likely produced a semantically incorrect diff; the
    hypothesis itself is sound. This is a clean restatement with exact line references.
  expected_gain_ms: -15 to -30 on cfg-postproc-heavy; 0 on cfg-default
  benchmark_first: false
  risks: |
    Sole risk: re-entrant or concurrent calls to boxBlurLinear (impossible in single-
    threaded JS and synchronous applyChain at lines 345-350). Confirm both applyBloom
    calls at lines 346 and 349 are sequential if-branches with no async or callbacks
    between them — they are. No new branches added to any HOT-PATH function.
  code_shape: |
    // After glyph-crt.js:28 ('use strict'), before srgbToLinear at line 30:
    let _crtBlurOut = null;
    let _crtBlurTmp = null;
    let _bloomLinBuf = null;

    // boxBlurLinear (line 85): replace lines 86-87 only, rest unchanged:
    function boxBlurLinear(src, w, h, radius) {
      const N = src.length;
      if (!_crtBlurOut || _crtBlurOut.length < N) {
        _crtBlurOut = new Float32Array(N);
        _crtBlurTmp = new Float32Array(N);
      }
      const out = _crtBlurOut, tmp = _crtBlurTmp;
      // ... rest of boxBlurLinear unchanged (horizontal pass, vertical pass, return out)
    }

    // applyBloom (line 127): replace line 132 only, rest unchanged:
    function applyBloom(rgba, w, h, opts) {
      const threshold = opts.threshold == null ? 0.75 : opts.threshold;
      const intensity = opts.intensity == null ? 0.5 : opts.intensity;
      const radius = opts.radius == null ? 6 : opts.radius;
      const N = rgba.length / 4;
      if (!_bloomLinBuf || _bloomLinBuf.length < N * 3) _bloomLinBuf = new Float32Array(N * 3);
      const lin = _bloomLinBuf;
      // ... lines 133-153 unchanged
    }

- id: OPT-018
  area: srgbToLinear 256-entry LUT in glyph-crt.js eliminates Math.pow per pixel
  priority: P0
  status: queued
  files:
  - src/lib/glyph-crt.js
  hypothesis: |
    `srgbToLinear` at glyph-crt.js:30 calls `Math.pow((s + 0.055) / 1.055, 2.4)` for
    inputs above 10/255. In `applyBloom` at glyph-crt.js:127, `srgbToLinear` is called
    3 times per pixel in the first scan (lines 134-136) and 3 times per pixel in the
    accumulation scan (lines 146-148) — 6 Math.pow calls per pixel per `applyBloom`.
    cfg-postproc-heavy calls `applyBloom` twice (halation line 346, bloom line 349):
    12 Math.pow calls per pixel per frame. At 1024x504 = 516096 pixels: ~6.2M Math.pow
    calls per frame on cfg-postproc-heavy.

    All `srgbToLinear` call sites in `applyBloom` (lines 134-136, 146-148) and
    `applyPhosphorDecay` (lines 55-57, 66-68) pass a Uint8ClampedArray byte (0-255).
    The input domain is fully quantized to 256 values. Fix: add a 256-entry Float64Array
    LUT `_SRGB_TO_LINEAR_LUT` inside the IIFE after line 28, built with the same formula.
    This pattern is already established in src/index.html:1769-1776 as `SRGB_LINEAR_LUT`.
    Replace `srgbToLinear`'s body with a LUT lookup.

    Bit-exact argument: `_SRGB_TO_LINEAR_LUT[i]` is computed with the same IEEE 754
    double-precision Math.pow as the original function for each i in 0..255. Using
    Float64Array (not Float32) guarantees zero precision loss. Since input is always
    an integer byte, LUT and direct computation produce bit-identical Float64 results.
    Note: `linearToSrgb` at line 34 is NOT changed — its input is a sum of linear
    floats, not quantized to 256 values.
  expected_gain_ms: -8 to -20 on cfg-postproc-heavy; 0 on cfg-default
  benchmark_first: false
  risks: |
    Precision: using Float64Array (not Float32Array) eliminates any single-precision
    truncation risk. The LUT is 256 x 8 bytes = 2 KB — trivial memory cost.
    Build-time correctness: verify max(|LUT[i] - srgbToLinear_old(i)|) === 0 for all i.
  code_shape: |
    // After glyph-crt.js:28 ('use strict'), before srgbToLinear at line 30:
    const _SRGB_TO_LINEAR_LUT = (function () {
      const lut = new Float64Array(256);
      for (let i = 0; i < 256; i++) {
        const s = i / 255;
        lut[i] = s <= 0.04045 ? s / 12.92 : Math.pow((s + 0.055) / 1.055, 2.4);
      }
      return lut;
    })();

    // Replace srgbToLinear body (lines 30-33):
    function srgbToLinear(c) {
      return _SRGB_TO_LINEAR_LUT[c < 0 ? 0 : c > 255 ? 255 : (c | 0)];
    }

