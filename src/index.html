    const name = `frame_${String(idx + 1).padStart(4, '0')}.png`;
    statusEl().textContent =
      `RECORDING ${idx + 1}/${recState.total} (${CONFIG.scene} @ ${CONFIG.palette})`;
    drawingContext.canvas.toBlob(function (blob) {
      if (!blob) {
        recState._capturing = false;
        if (console && console.warn) console.warn('handleRecordFrame: toBlob returned null');
        return;
      }
      const reader = new FileReader();
      reader.onload = function () {
        const dataUrl = reader.result;
        const base64 = dataUrl.split(',')[1];
        recState.zip.file(name, base64, { base64: true });
        if (recState.framesB64) recState.framesB64.push(base64);
        recState.frameIdx++;
        recState._capturing = false;
        if (recState.frameIdx >= recState.total && !recState.done) {
          recState.done = true;
          finishRecording();
        }
      };
      reader.onerror = function () {
        recState._capturing = false;
        if (console && console.warn) console.warn('handleRecordFrame: FileReader error', reader.error);
      };
      reader.readAsDataURL(blob);
    }, 'image/png');
  }

  function finishRecording() {
    statusEl().textContent = `RECORDING DONE — building ZIP…`;
    recState.zip.generateAsync({ type: 'blob' }).then((blob) => {
      if (typeof recState.onFinish === 'function') {
        recState.onFinish(blob);
        /* This path IS the normal GUI export (recordGIF/recordMP4 hand
           frames to the Rust encoder).  Audit 2026-06-10: the old
           "handled by test hook" wording was developer jargon, and the
           encode that follows can take 10–30 s with zero feedback — say
           what is actually happening. */
        statusEl().textContent =
          `RECORDED ${recState.total} frames — encoding… (save dialog opens when done)`;
        return;
      }
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      const stamp = new Date().toISOString().replace(/[:.]/g, '-');
      a.download = `glyph-grid_${CONFIG.scene}_${CONFIG.palette}_${stamp}.zip`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      statusEl().textContent =
        `RECORDED ${recState.total} frames → ZIP downloaded. Unzip + run export-gif.sh`;
    });
  }

  /* =================================================================
     Test hooks. getConfig now returns a deep clone (EC-4).
     ================================================================= */
  window.__glyphGridTest = {
    beginRecord(totalOrOpts, onFinishOverride) {
      const opts = (typeof totalOrOpts === 'object' && totalOrOpts !== null)
        ? totalOrOpts
        : { total: totalOrOpts };
      recState = {
        zip: new JSZip(),
        framesB64: opts.collectFrames ? [] : null,
        frameIdx: 0,
        total: opts.total || Math.round(CONFIG.animation.duration * CONFIG.animation.fps),
        done: false,
        onFinish: opts.onFinish || onFinishOverride,
      };
      /* Re-engage the p5 draw loop in case a previous recording's
         finishRecording → noLoop() is still in effect.  Without this,
         batch-mode runBatchExport stalls after the first job. */
      try { loop(); } catch (e) {}
    },
    getConfig: () => JSON.parse(JSON.stringify(CONFIG)),
    setConfig: (overrides) => {
      /* Deep-merge object values so partial overrides like
         { dither: { mode: 'stbn' } } don't blow away the rest of dither.* */
      for (const k in overrides) {
        const v = overrides[k];
        if (v && typeof v === 'object' && !Array.isArray(v)
            && CONFIG[k] && typeof CONFIG[k] === 'object' && !Array.isArray(CONFIG[k])) {
          Object.assign(CONFIG[k], v);
        } else {
          CONFIG[k] = v;
        }
      }
    },
    getRecState: () => recState,
    getSkillVersion: () => (window.GlyphGrid && GlyphGrid.compat ? GlyphGrid.compat.SKILL_VERSION : '1.x'),

    /* Batch GIF export — drive hundreds of variations unattended.
       Each `job` is { name: 'human-label', path: '/abs/path/foo.gif',
       config: { palette: 'spice', colorMode: 'duotone', dither: {mode:'stbn'} },
       frames: 24 }.
       opts: { onProgress(idx,total,name), onComplete({ ok, errors }),
              settleMs:120, perf:false }.
       When opts.perf === true: clears the __pfRing before each job, snapshots
       per-stage timings + p50/p95 totals after each job, and emits a
       `PERF_JOB <json>` NDJSON line via the cli_log Tauri command (stderr).
       The orchestrator (scripts/loop_orchestrator/) parses these lines. */
    runBatchExport(jobs, opts) {
      opts = opts || {};
      const total = jobs.length;
      const errors = [];
      let idx = 0;
      const settle = opts.settleMs != null ? opts.settleMs : 120;
      const perfMode = !!opts.perf;
      const tauri = window.__TAURI__ && window.__TAURI__.core && window.__TAURI__.core.invoke;
      if (!tauri) { console.warn('batch: not in Tauri, aborting'); return; }
      const self = this;

      /* Snapshot the in-process perf ring into a flat per-stage avg + total
         p50/p95. Ring is { stages: {name: ms, ...}, total: ms }[]. Caller
         already cleared the ring before recording started, so this captures
         only the just-finished job's frames. */
      function snapshotPerf(jobName, jobFrames, framesB64) {
        const ring = (window.__perfRing && window.__perfRing()) || [];
        if (!ring.length) return null;
        const stageSums = {};
        const totals = [];
        for (let i = 0; i < ring.length; i++) {
          const f = ring[i];
          if (f.stages) {
            for (const k in f.stages) stageSums[k] = (stageSums[k] || 0) + f.stages[k];
          }
          if (typeof f.total === 'number') totals.push(f.total);
        }
        const n = ring.length;
        const avgMs = { total: totals.reduce(function (a, b) { return a + b; }, 0) / n };
        for (const k in stageSums) avgMs[k] = stageSums[k] / n;
        totals.sort(function (a, b) { return a - b; });
        const p50 = totals[Math.floor(totals.length * 0.5)] || 0;
        const p95 = totals[Math.floor(totals.length * 0.95)] || totals[totals.length - 1] || 0;
        const anchors = [];
        if (framesB64 && framesB64.length) {
          var idxs = [0, Math.floor(framesB64.length / 2), framesB64.length - 1];
          for (var i = 0; i < idxs.length; i++) {
            anchors.push(framesB64[idxs[i]] || '');
          }
        }
        /* Sutskever B2 — interactive switch latency: time from this
           job's config being applied to the first frame that reflects
           it (set by __pfCommit on the first recorded frame). null if
           the change was never observed (no recorded frame). */
        var _lat = (window.__perfLastLatency && window.__perfLastLatency()) || null;
        return {
          name: jobName,
          frames: jobFrames || (framesB64 ? framesB64.length : 0),
          frames_seen: n,
          avg_ms: avgMs,
          p50: p50,
          p95: p95,
          switch_ms: _lat ? _lat.ms : null,
          frame_anchors: anchors,
        };
      }

      function applyConfig(cfg) {
        if (!cfg) return;
        for (const k in cfg) {
          const v = cfg[k];
          if (v && typeof v === 'object' && !Array.isArray(v)
              && CONFIG[k] && typeof CONFIG[k] === 'object' && !Array.isArray(CONFIG[k])) {
            Object.assign(CONFIG[k], v);
          } else {
            CONFIG[k] = v;
          }
        }
      }

      /* Audit 2026-06-10: jobs with PARTIAL configs used to inherit
         whatever the previous job set (e.g. job 1 sets dither.mode=
         'jarvisJudiceNinke', job 2 only overrides `ramp` → silently
         renders with job 1's dither).  Snapshot the pre-batch CONFIG
         once and restore it before every job so each job's config is
         applied against the same deterministic baseline. */
      const baselineConfig = JSON.parse(JSON.stringify(CONFIG));
      function resetToBaseline() {
        for (const k in baselineConfig) {
          const v = baselineConfig[k];
          CONFIG[k] = (v && typeof v === 'object') ? JSON.parse(JSON.stringify(v)) : v;
        }
      }

      function next() {
        if (idx >= total) {
          console.log('batch: complete', total, 'jobs,', errors.length, 'errors');
          if (opts.onComplete) opts.onComplete({ ok: total - errors.length, errors });
          return;
        }
        const job = jobs[idx];
        if (opts.onProgress) opts.onProgress(idx, total, job.name);

        /* Multi-source manifest support: if this job's source differs
           from the currently-loaded one, swap before applying config.
           Keeps the batch in ONE Tauri session even when N source
           images need exercising (autonomous loop bench: 4 sources × 5
           configs in a single studio process, not 4). */
        const wantSrc = job.inPath || null;
        if (wantSrc && wantSrc !== __cliCurrentSource
            && typeof _cliLoadSource === 'function'
            && window.__TAURI__ && window.__TAURI__.core) {
          _cliLoadSource(wantSrc).then(function () {
            _runJob();
          }).catch(function (e) {
            console.warn('batch: source swap failed for', job.name, e);
            errors.push({ name: job.name, err: 'source-swap: ' + String(e) });
            idx++;
            setTimeout(next, 50);
          });
          return;
        }
        _runJob();

      function _runJob() {
        resetToBaseline();          // audit 2026-06-10: no cross-job leakage
        applyConfig(job.config);
        // Force loop on so draw() advances
        try { loop(); } catch (e) {}

        /* Loop-clean fix: when delay_ms doesn't divide 1000 evenly (e.g.
           30 fps wants 33.33 ms but rounds to 30 ms = 3 cs), the GIF
           output plays back at effFps = 1000/delayMs, not at the slider's
           nominal fps.  If we don't sync the studio's animation timeline
           to the same effFps, the captured frames overshoot the source
           loop and the output GIF stutters at the wrap point.  Override
           CONFIG.animation.fps for the duration of this job, restore
           after the encoder finishes. */
        const userFps = (CONFIG.animation && CONFIG.animation.fps) || 24;
        const delayMs = Math.max(20, Math.round(1000 / userFps / 10) * 10);
        const effFps = 1000 / delayMs;
        const savedFps = CONFIG.animation.fps;
        CONFIG.animation.fps = effFps;

        /* Reset the perf ring so the snapshot in onFinish captures only
           this job's frames (perfMode only). */
        if (perfMode && typeof window.__perfClear === 'function') {
          try { window.__perfClear(); } catch (_) {}
        }

        setTimeout(() => {
          /* Sutskever B2 — mark the switch point AFTER the artificial
             settle, immediately before the first recorded draw. The
             first __pfCommit then yields __pfLastLatency = wall time of
             the first frame that reflects this job's config (atlas
             rebuild / buffer realloc included). That is exactly the
             interactive "slider → visible" cost; the artificial settle
             delay is deliberately excluded so switch_ms reflects felt
             latency, not the bench's pacing. */
          if (perfMode && typeof window.__markChange === 'function') {
            try { window.__markChange('job:' + job.name); } catch (_) {}
          }
          self.beginRecord({
            total: job.frames || 24,
            collectFrames: true,
            onFinish() {
              const rs = self.getRecState();
              const frames = (rs && rs.framesB64) || [];
              if (!frames.length) {
                console.warn('batch: empty frames for', job.name);
                errors.push({ name: job.name, err: 'no-frames' });
                CONFIG.animation.fps = savedFps;       // restore even on no-frames error
                idx++;
                setTimeout(next, 50);
                return;
              }
              /* Format dispatch: GIF (default) → save_gif_to_path with
                 delayMs; MP4 → save_mp4_to_path with fps.  Both honour the
                 capWidth resize.  Format is also auto-derived from the
                 output path extension if `job.format` isn't set. */
              const inferred = (job.path || '').toLowerCase().endsWith('.mp4') ? 'mp4' : 'gif';
              const fmt = (job.format || inferred).toLowerCase();
              const cmd = fmt === 'mp4' ? 'save_mp4_to_path' : 'save_gif_to_path';
              const args = fmt === 'mp4'
                ? {
                    frames: frames.map(b => ({ b64: b })),
                    fps: Math.round(effFps),
                    path: job.path,
                    capWidth: (typeof job.capWidth === 'number' && job.capWidth > 0) ? job.capWidth : null,
                  }
                : {
                    frames: frames.map(b => ({ b64: b })),
                    delayMs: delayMs,
                    path: job.path,
                    capWidth: (typeof job.capWidth === 'number' && job.capWidth > 0) ? job.capWidth : null,
                    targetMaxBytes: (typeof job.targetMaxBytes === 'number' && job.targetMaxBytes > 0) ? job.targetMaxBytes : null,
                  };
              /* Sutskever B3 — export wall-time is the dominant real cost
                 (gifski encode 3–25 s/job, ITER-026) and no optimization
                 has ever measured it. Time the full encode round-trip
                 (frame IPC serialize + Rust encode + adaptive shrink) —
                 exactly what a user waits on at export. */
              const _encT0 = performance.now();
              tauri(cmd, args)
              .then(p => {
                const _encMs = performance.now() - _encT0;
                console.log('batch:', (idx + 1) + '/' + total, job.name, '→', p);
                tauri('cli_log', { msg: 'batch: ' + (idx + 1) + '/' + total + ' ' + job.name + ' → ' + p }).catch(()=>{});
                /* Emit PERF_JOB NDJSON when in perf mode — orchestrator
                   parses this from the studio's stderr. */
                if (perfMode) {
                  try {
                    const snap = snapshotPerf(job.name, job.frames || 24, frames);
                    if (snap) {
                      snap.encode_ms = _encMs;
                      tauri('cli_log', { msg: 'PERF_JOB ' + JSON.stringify(snap) }).catch(()=>{});
                    }
                  } catch (e) {
                    tauri('cli_log', { msg: 'PERF_JOB_ERR ' + job.name + ' ' + String(e) }).catch(()=>{});
                  }
                }
                CONFIG.animation.fps = savedFps;     // restore on success
                idx++;
                setTimeout(next, 50);
              })
              .catch(e => {
                console.warn('batch: save failed', job.name, e);
                tauri('cli_log', { msg: 'batch: save failed ' + job.name + ' fmt=' + fmt + ' err=' + String(e) }).catch(()=>{});
                errors.push({ name: job.name, err: String(e) });
                CONFIG.animation.fps = savedFps;     // restore on encoder failure
                idx++;
                setTimeout(next, 50);
              });
            }
          });
        }, settle);
      }  // _runJob
      }  // next
      next();
    },
  };

  /* =========================================================================
     Test batch driver — bake all test phases into the build so the dev
     console only needs `runStudioPhase(N)` to kick off the run.

     The output base directory defaults to the user's Documents folder via
     a window global that callers can override before invoking the driver:
       window.GLYPH_TEST_BASE = '/some/other/path/';
       runStudioPhase(1);
     If unset, `runStudioPhasesAt([1,...], '/abs/dir/')` is the cleaner
     entry point for non-default locations.
     ========================================================================= */
  const TEST_BASE = (typeof window !== 'undefined' && window.GLYPH_TEST_BASE)
    ? window.GLYPH_TEST_BASE
    : null;
  const PHASES = {
    1: {
      dir: '01-palette-colormode-dither/',
      jobs: (() => {
        const palettes = ['monochrome','phosphor','bauhaus','lovespark','mono-amber',
                          'cyber-phosphor','amber-phosphor','bone-charcoal',
                          'cream-paper','silver-charcoal','spice'];
        const colorModes = ['preserve','monochrome','duotone','gradient'];
        const dithers = ['none','bayer4','bayer8','blueNoise','temporal','stbn',
                         'floydSteinberg','atkinson','jarvisJudiceNinke'];
        const out = [];
        for (const p of palettes) {
          for (const cm of colorModes) {
            for (const d of dithers) {
              out.push({
                name: `p-${p}_cm-${cm}_d-${d}`,
                config: { palette: p, colorMode: cm,
                          dither: { mode: d, asSourcePrefilter: true, levels: 16 } },
              });
            }
          }
        }
        return out;
      })(),
    },
    2: {
      dir: '02-selection-glyphset/',
      jobs: (() => {
        const sels = ['brightness','shape','shape-edge-aware','edge-directional'];
        const sets = [null,'ascii','asciiDense','blockElements','braille','sextant','octant'];
        const out = [];
        for (const s of sels) for (const g of sets)
          out.push({
            name: `sel-${s}_gs-${g === null ? 'null' : g}`,
            config: { selectionMode: s, glyphSet: g,
                      palette: 'cream-paper', colorMode: 'monochrome',
                      dither: { mode: 'temporal' } },
          });
        return out;
      })(),
    },
    3: {
      dir: '03-ramp/',
      jobs: ['classic','dense','sparse','unicode-block','gradient','gradientNoSpace',
             'blockShaded','blockAscend','radial'].map(r => ({
        name: `ramp_${r}`, config: { ramp: r },
      })),
    },
    4: {
      dir: '04-postprocess/',
      jobs: (() => {
        const stages = ['vignette','bloom','halation','scanlines',
                        'chromaticAberration','phosphorDecay','depthFog','crtBeam'];
        const off = stages.reduce((o, k) => (o[k] = { enabled: false }, o), {});
        const out = stages.map(s => ({
          name: `pp_${s}`,
          config: { postprocess: { ...off, [s]: { enabled: true } } },
        }));
        out.push({ name: 'pp_kitchen-sink',
          config: { postprocess: stages.reduce((o, k) => (o[k] = { enabled: true }, o), {}) }});
        const pairs = [['crtBeam','phosphorDecay'], ['bloom','halation'],
                       ['scanlines','vignette'], ['chromaticAberration','crtBeam']];
        for (const [a, b] of pairs) {
          const cfg = { ...off, [a]: { enabled: true }, [b]: { enabled: true } };
          out.push({ name: `pp_${a}+${b}`, config: { postprocess: cfg } });
        }
        return out;
      })(),
    },
    5: {
      dir: '05-sampling/',
      jobs: ['average','nearest','edge-weighted'].map(s => ({
        name: `sampling_${s}`, config: { samplingStrategy: s },
      })),
    },
    6: {
      dir: '06-breathing/',
      jobs: (() => {
        const D = { emaAlpha: 0.35, gainSwing: 0.30, jitter: 0.05, pulseHz: 0.70 };
        const E = {
          emaAlpha: [0.0, 1.0], gainSwing: [0.0, 0.6],
          jitter: [0.0, 0.2], pulseHz: [0.1, 3.0],
        };
        const out = [];
        for (const k of Object.keys(E)) {
          for (const tag of ['min','max']) {
            const v = E[k][tag === 'min' ? 0 : 1];
            out.push({
              name: `breath_${k}_${tag}`,
              config: { studio: { breathing: { ...D, [k]: v } } },
            });
          }
        }
        return out;
      })(),
    },
    7: {
      dir: '07-grid/',
      jobs: [
        { name: 'grid_chunky',  config: { grid: { cols: 60, rows: 40 }, font: { size: 14 } } },
        { name: 'grid_default', config: { grid: { cols: 240, rows: 120 }, font: { size: 8 } } },
        { name: 'grid_fine',    config: { grid: { cols: 400, rows: 300 }, font: { size: 3 } } },
      ],
    },
    8: {
      dir: '08-animation/',
      jobs: [
        { name: 'anim_short_low',   frames: 24, config: { animation: { duration: 2,  fps: 12, loop: true } } },
        { name: 'anim_short_high',  frames: 24, config: { animation: { duration: 2,  fps: 60, loop: true } } },
        { name: 'anim_long_low',    frames: 48, config: { animation: { duration: 15, fps: 12, loop: true } } },
        { name: 'anim_long_high',   frames: 48, config: { animation: { duration: 15, fps: 60, loop: true } } },
      ],
    },
    9: {
      dir: '09-showcase/',
      jobs: [
        { name: 'showcase_warm-bone-stipple', frames: 48, config: {
            palette: 'cream-paper', colorMode: 'monochrome', ramp: 'gradient',
            dither: { mode: 'stbn', asSourcePrefilter: true, levels: 16 },
            selectionMode: 'shape-edge-aware', glyphSet: 'octant',
        }},
        { name: 'showcase_cyber-phosphor-crt', frames: 48, config: {
            palette: 'cyber-phosphor', colorMode: 'gradient', ramp: 'blockAscend',
            dither: { mode: 'temporal' }, selectionMode: 'brightness',
            postprocess: ['vignette','bloom','halation','scanlines','chromaticAberration',
                          'phosphorDecay','depthFog','crtBeam'].reduce(
                            (o, k) => (o[k] = { enabled: true }, o), {}),
        }},
        { name: 'showcase_amber-monitor', frames: 48, config: {
            palette: 'amber-phosphor', colorMode: 'monochrome', ramp: 'unicode-block',
            dither: { mode: 'bayer8' }, selectionMode: 'brightness',
            postprocess: { crtBeam: { enabled: true } },
        }},
        { name: 'showcase_spice-charcoal', frames: 48, config: {
            palette: 'spice', colorMode: 'gradient', ramp: 'gradient',
            dither: { mode: 'stbn' }, selectionMode: 'shape-edge-aware', glyphSet: 'octant',
        }},
        { name: 'showcase_minimal-paper', frames: 48, config: {
            palette: 'cream-paper', colorMode: 'monochrome', ramp: 'sparse',
            dither: { mode: 'none' }, selectionMode: 'brightness',
            postprocess: {},
        }},
      ],
    },
  };

  window.runStudioPhase = function (n) {
    if (!TEST_BASE) {
      console.warn('runStudioPhase requires window.GLYPH_TEST_BASE to be set ' +
        'to an absolute output directory, OR call runStudioPhasesAt([n], baseDir) instead.');
      return;
    }
    const phase = PHASES[n];
    if (!phase) { console.warn('unknown phase', n); return; }
    const jobs = phase.jobs.map(j => ({
      ...j, path: TEST_BASE + phase.dir + j.name + '.gif',
    }));
    console.log('Phase', n, ':', jobs.length, 'jobs →', TEST_BASE + phase.dir);
    const t0 = performance.now();
    window.__glyphGridTest.runBatchExport(jobs, {
      onProgress: (i, n2, name) => {
        if (i % 10 === 0) console.log('  ', i + '/' + n2, name);
      },
      onComplete: (r) => {
        const dt = ((performance.now() - t0) / 1000).toFixed(1);
        console.log('PHASE', n, 'COMPLETE — ok=' + r.ok + ', errors=' + r.errors.length + ', ' + dt + 's');
        if (r.errors.length) console.warn('errors:', r.errors);
      },
    });
  };
  window.runAllStudioPhases = function () {
    if (!TEST_BASE) {
      console.warn('runAllStudioPhases requires window.GLYPH_TEST_BASE to be set ' +
        'to an absolute output directory, OR call runStudioPhasesAt([1,...,9], baseDir).');
      return;
    }
    const order = [1, 2, 3, 4, 5, 6, 7, 8, 9];
    let i = 0;
    function next() {
      if (i >= order.length) { console.log('ALL PHASES DONE'); return; }
      const n = order[i++];
      const phase = PHASES[n];
      const jobs = phase.jobs.map(j => ({
        ...j, path: TEST_BASE + phase.dir + j.name + '.gif',
      }));
      console.log('STARTING Phase', n, '—', jobs.length, 'jobs');
      window.__glyphGridTest.runBatchExport(jobs, {
        onProgress: (k, total, name) => {
          if (k % 10 === 0) console.log('  ', k + '/' + total, name);
        },
        onComplete: (r) => {
          console.log('Phase', n, 'done. ok=' + r.ok + ', errors=' + r.errors.length);
          setTimeout(next, 200);
        },
      });
    }
    next();
  };

  /* Run an arbitrary list of phases against an arbitrary base directory.
     For testing the same phase configs on a different source image without
     overwriting prior runs.
       runStudioPhasesAt([2,3,4,5,6,7,8,9],
                         '/Users/.../Glyph Grid Studio Test/thor/');
     The batch driver creates parent dirs on save (Rust mkdir -p), so the
     phase sub-folders (02-selection-glyphset/, etc.) appear automatically. */
  window.runStudioPhasesAt = function (phaseNumbers, baseDir) {
    if (!baseDir.endsWith('/')) baseDir += '/';
    let i = 0;
    function next() {
      if (i >= phaseNumbers.length) {
        console.log('PHASES DONE for', baseDir);
        return;
      }
      const n = phaseNumbers[i++];
      const phase = PHASES[n];
      if (!phase) { console.warn('unknown phase', n); setTimeout(next, 50); return; }
      const jobs = phase.jobs.map(j => ({
        ...j, path: baseDir + phase.dir + j.name + '.gif',
      }));
      console.log('STARTING Phase', n, 'at', baseDir + phase.dir, '—', jobs.length, 'jobs');
      window.__glyphGridTest.runBatchExport(jobs, {
        onProgress: (k, total, name) => {
          if (k % 10 === 0) console.log('  ', k + '/' + total, name);
        },
        onComplete: (r) => {
          console.log('Phase', n, 'done. ok=' + r.ok + ', errors=' + r.errors.length);
          setTimeout(next, 200);
        },
      });
    }
    next();
  };

  /* =========================================================================
     KAWAII VARIANTS — 10 curated looks using the new kawaii postprocess
     overlay + kawaii-pink palette. Call as:
       runKawaiiVariants('/abs/path/to/kawaii-output/')
     Writes 10 GIFs into the supplied directory.
     ========================================================================= */
  window.runKawaiiVariants = function (baseDir) {
    if (!baseDir) {
      console.warn('runKawaiiVariants requires an absolute output directory.');
      return;
    }
    if (!baseDir.endsWith('/')) baseDir += '/';

    const PP_OFF = ['vignette','bloom','halation','scanlines',
                    'chromaticAberration','phosphorDecay','depthFog','crtBeam','kawaii']
      .reduce((o, k) => (o[k] = { enabled: false }, o), {});
    const ppWith = (overrides) => Object.assign({}, PP_OFF, overrides);

    const variants = [
      // 1. Classic — soft cream + hot-pink gradient + steady kawaii overlay
      { name: '01_classic', config: {
          palette: 'kawaii-pink', colorMode: 'gradient', ramp: 'gradient',
          dither: { mode: 'stbn', asSourcePrefilter: true, levels: 16 },
          selectionMode: 'brightness',
          postprocess: ppWith({ kawaii: { enabled: true, intensity: 0.85 } }),
      }},
      // 2. Dense hearts — more particles, bigger kawaii presence
      { name: '02_dense-hearts', config: {
          palette: 'kawaii-pink', colorMode: 'gradient', ramp: 'gradient',
          dither: { mode: 'stbn' }, selectionMode: 'brightness',
          postprocess: ppWith({ kawaii: { enabled: true, intensity: 0.95,
                       heartCount: 36, sparkleCount: 70, twinkleCount: 120 } }),
      }},
      // 3. Pastel duotone — softer color split + kawaii
      { name: '03_pastel-duotone', config: {
          palette: 'kawaii-pink', colorMode: 'duotone', ramp: 'gradient',
          dither: { mode: 'stbn' }, selectionMode: 'brightness',
          postprocess: ppWith({ kawaii: { enabled: true, intensity: 0.75 } }),
      }},
      // 4. Dreamy bloom — heavy bloom + kawaii (glowing fuzz)
      { name: '04_dreamy-bloom', config: {
          palette: 'kawaii-pink', colorMode: 'gradient', ramp: 'gradient',
          dither: { mode: 'temporal' }, selectionMode: 'brightness',
          postprocess: ppWith({
            bloom: { enabled: true, threshold: 0.55, intensity: 0.6, radius: 6 },
            kawaii: { enabled: true, intensity: 0.85, heartCount: 14 },
          }),
      }},
      // 5. Y2K pop — scanlines + kawaii (CD-ROM cute era)
      { name: '05_y2k-pop', config: {
          palette: 'kawaii-pink', colorMode: 'gradient', ramp: 'blockAscend',
          dither: { mode: 'bayer8' }, selectionMode: 'brightness',
          postprocess: ppWith({
            scanlines: { enabled: true, period: 2 },
            kawaii: { enabled: true, intensity: 0.9, heartCount: 20 },
          }),
      }},
      // 6. Charcoal cute — cream-paper pencil-sketch with kawaii sparkles
      { name: '06_charcoal-cute', config: {
          palette: 'cream-paper', colorMode: 'monochrome', ramp: 'gradient',
          dither: { mode: 'stbn' },
          selectionMode: 'shape-edge-aware', glyphSet: 'octant',
          postprocess: ppWith({ kawaii: { enabled: true, intensity: 0.75,
                       hueR: 230, hueG: 100, hueB: 160, heartCount: 10, sparkleCount: 25 } }),
      }},
      // 7. Pink CRT — full CRT-beam + kawaii overlay (kawaii on a TV)
      { name: '07_pink-CRT', config: {
          palette: 'kawaii-pink', colorMode: 'gradient', ramp: 'gradient',
          dither: { mode: 'temporal' }, selectionMode: 'brightness',
          postprocess: ppWith({
            crtBeam: { enabled: true, intensity: 0.4, slotMask: true, slotStrength: 0.18 },
            kawaii: { enabled: true, intensity: 0.85 },
          }),
      }},
      // 8. Minimalist — sparse glyphs + sparing kawaii
      { name: '08_minimalist', config: {
          palette: 'kawaii-pink', colorMode: 'monochrome', ramp: 'sparse',
          dither: { mode: 'none' }, selectionMode: 'brightness',
          postprocess: ppWith({ kawaii: { enabled: true, intensity: 0.6,
                       heartCount: 6, sparkleCount: 14, twinkleCount: 28 } }),
      }},
      // 9. Max cute — everything turned up
      { name: '09_max-cute', config: {
          palette: 'kawaii-pink', colorMode: 'gradient', ramp: 'gradient',
          dither: { mode: 'stbn' }, selectionMode: 'brightness',
          postprocess: ppWith({
            halation: { enabled: true, threshold: 0.5, intensity: 0.4, radius: 5 },
            bloom: { enabled: true, threshold: 0.6, intensity: 0.4, radius: 4 },
            kawaii: { enabled: true, intensity: 1.0, heartCount: 32,
                      sparkleCount: 60, twinkleCount: 100 },
          }),
      }},
      // 10. Holographic — chromatic aberration + kawaii (iridescent shift)
      { name: '10_holographic', config: {
          palette: 'kawaii-pink', colorMode: 'gradient', ramp: 'gradient',
          dither: { mode: 'stbn' }, selectionMode: 'brightness',
          postprocess: ppWith({
            chromaticAberration: { enabled: true, amount: 1.5 },
            kawaii: { enabled: true, intensity: 0.85, heartCount: 16 },
          }),
      }},
    ];

    const jobs = variants.map(v => ({
      ...v, frames: 32,
      path: baseDir + 'kawaii_' + v.name + '.gif',
    }));
    console.log('runKawaiiVariants:', jobs.length, 'jobs →', baseDir);
    window.__glyphGridTest.runBatchExport(jobs, {
      onProgress: (i, n, name) => console.log('  ', i + '/' + n, name),
      onComplete: (r) => console.log('KAWAII DONE — ok=' + r.ok + ', errors=' + r.errors.length),
    });
  };

  /* Studio UI — Tweakpane-based live tuning. Opt-in via CONFIG.studio.enabled. */
  window.SCENES = SCENES;
  window.GlyphStudio && window.GlyphStudio.init({
    config: CONFIG,
    title: 'glyph studio',
    palettes: PALETTES,
    ramps: RAMPS,
    testHook: window.__glyphGridTest,
    sceneCacheKeys: ['__sourceProcessed'],
    imageRef: {
      name: 'sourceImg',
      set: function (img) {
        sourceImg = img;
        /* Auto-fit canvas to the new image's aspect ratio so portrait /
           square / 4:3 / etc. inputs don't get cropped by the 2:1 default.
           Disabled via CONFIG.studio.fitCanvasToImage = false. */
        try { fitCanvasToImage(img); } catch (e) { console.warn(e); }
        /* Animated source — auto-tune animation params so recording
           captures exactly one source loop (instead of N loops or partial
           loops driven by the default 6 s duration). */
        try {
          if (img && img.gifProperties && img.numFrames && img.numFrames() > 1) {
            const props = img.gifProperties;
            let totalMs = 0;
            for (let i = 0; i < props.numFrames; i++) totalMs += (props.frames[i].delay || 100);
            if (totalMs > 0) {
              CONFIG.animation.duration = totalMs / 1000;
              CONFIG.animation.loop = true;
              console.log('animated source: ' + props.numFrames + ' frames, ' + (totalMs / 1000).toFixed(2) + 's loop — duration auto-set');
            }
          }
        } catch (e) { console.warn('animated-source auto-tune failed:', e); }
        /* Image just landed — make sure the draw loop is alive even if a
           previous setting (or the empty-state placeholder branch) had it
           paused.  No-op if already looping. */
        try { loop(); } catch (e) {}
      },
    },
  });

  /* ===========================================================================
     CLI / headless render auto-hook.

     When this binary was launched as `glyph-grid-studio render --in foo --out
     bar`, the Rust side stored a HeadlessRenderJob in managed state.  We poll
     for it on startup; if present, auto-load the image, apply the config, run
     a single-job batch, and signal exit.  In GUI mode the call returns null
     and we do nothing.
     =========================================================================== */
  /* CLI/batch source loader — shared by tryHeadlessRender (initial load)
     and runBatchExport (per-job source swap when manifest jobs have
     heterogeneous `in` fields). Awaits decode + fit + one settle frame
     so the caller can immediately apply config and begin recording. */
  let __cliCurrentSource = null;
  async function _cliLoadSource(inPath) {
    const dataUrl = await window.__TAURI__.core.invoke('read_image_file',
                                                      { path: inPath });
    await new Promise(function (resolve, reject) {
      window.loadImage(dataUrl, function (img) {
        sourceImg = img;
        try { fitCanvasToImage(img); } catch (e) { console.warn(e); }
        try { loop(); } catch (e) {}
        resolve();
      }, function (err) {
        reject(err);
      });
    });
    __cliCurrentSource = inPath;
    // Settle one or two frames so the canvas reflects the loaded image.
    await new Promise(function (r) { setTimeout(r, 300); });
  }

  async function tryHeadlessRender() {
    if (!(window.__TAURI__ && window.__TAURI__.core && window.__TAURI__.core.invoke)) {
      // Not running in Tauri at all (browser preview): nothing to do.
      return;
    }
    let job;
    try {
      job = await window.__TAURI__.core.invoke('get_cli_render_job');
    } catch (e) {
      // Command not registered → not running in Tauri-with-CLI.  Silent.
      return;
    }
    if (!job) {
      console.log('CLI: GUI mode (no headless job)');
      return;
    }
    console.log('CLI: render job received', job);

    // Pick the initial source — top-level `inPath`, or first job's `in`
    // (multi-source manifests may omit the top-level field).
    let initialSource = job.inPath;
    if (!initialSource && job.batch && Array.isArray(job.jobs) && job.jobs.length) {
      initialSource = job.jobs[0].inPath || null;
    }
    if (!initialSource) {
      console.error('CLI: no source path in manifest');
      try { await window.__TAURI__.core.invoke('exit_with_status', { ok: false }); } catch (_) {}
      return;
    }

    try {
      await _cliLoadSource(initialSource);
    } catch (e) {
      console.error('CLI: initial loadImage failed:', e);
      try { await window.__TAURI__.core.invoke('exit_with_status', { ok: false }); } catch (_) {}
      return;
    }

    /* Batch mode (ITER-024 + multi-source extension): the Rust side may
       pass `batch:true` with a jobs array.  Each job may carry its own
       `inPath` (multi-source manifests — used by the autonomous
       optimization loop's 4-source × 5-config bench).  When a job's
       inPath differs from the currently-loaded source, runBatchExport
       async-swaps the source via _cliLoadSource before the render. */
    if (job.batch && Array.isArray(job.jobs)) {
      var batchJobs = job.jobs.map(function (j) {
        return {
          name:           j.name || 'job',
          path:           j.outPath,
          inPath:         j.inPath || null,
          frames:         job.frames || 24,
          format:         j.format,
          config:         j.config || {},
          capWidth:       (j.capWidth && j.capWidth > 0) ? j.capWidth : 0,
          targetMaxBytes: (j.targetMaxBytes && j.targetMaxBytes > 0) ? j.targetMaxBytes : null,
        };
      });
      console.log('CLI: batch mode — ' + batchJobs.length + ' jobs queued' + (job.perf ? ' (perf:on)' : ''));
      __glyphGridTest.runBatchExport(batchJobs, {
        perf: !!job.perf,
        onComplete: function (result) {
          var ok = result && result.errors && result.errors.length === 0;
          var summary = 'batch complete: ' + (result.ok || 0) + '/' + batchJobs.length + ' ok';
          if (result.errors && result.errors.length) {
            summary += ', ' + result.errors.length + ' errors: ' +
              result.errors.map(function (e) { return e.name + '(' + e.err + ')'; }).join(', ');
          }
          console.log('CLI: ' + summary);
          window.__TAURI__.core.invoke('cli_log', { msg: summary }).catch(function () {});
          window.__TAURI__.core.invoke('exit_with_status', { ok: !!ok });
        },
      });
      return;
    }

    // Apply the CLI-supplied config (camelCase, JS-shape — built by Rust).
    if (job.config && typeof job.config === 'object') {
      try {
        __glyphGridTest.setConfig(job.config);
      } catch (e) {
        console.error('CLI: setConfig failed:', e);
      }
    }

    // Settle once more so the new config takes effect on the next frame.
    await new Promise(function (r) { setTimeout(r, 200); });

    // Run a single-job batch export to the requested output path.
    __glyphGridTest.runBatchExport([{
      name: 'cli',
      path: job.outPath,
      frames: job.frames || 24,
      format: job.format,  // 'gif' (default) | 'mp4' — Rust pre-resolves
      config: {},  // already applied above
    }], {
      onComplete: function (result) {
        var ok = result && result.errors && result.errors.length === 0 && result.ok === 1;
        console.log('CLI: render complete; exiting with ok=' + ok);
        window.__TAURI__.core.invoke('exit_with_status', { ok: !!ok });
      },
    });
  }

  // Wait for the p5 setup() + studio init + font load before polling.
  // 1500ms is generous; the actual setup is usually done by ~300ms.
  window.addEventListener('DOMContentLoaded', function () {
    setTimeout(tryHeadlessRender, 1500);
  });
  </script>
</body>
</html>
