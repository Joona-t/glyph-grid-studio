<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>glyph-grid</title>
  <style>
    /* Black page, centered canvas. The visible canvas background is set
       per-frame from the active palette — this CSS is just the page chrome. */
    html, body {
      margin: 0; padding: 0;
      background: #000;
      color: #888;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      min-height: 100vh;
      /* Audit 2026-06-10 (live finding): wheel-scrolling the Tweakpane
         panel scrolled the whole document, pushing the canvas out of
         view while reaching the Export buttons at the bottom of the
         panel.  The document never needs to scroll — the canvas centers
         in the viewport and the panel scrolls internally (rule on
         .tp-dfwv below). */
      height: 100vh;
      overflow: hidden;
    }
    body {
      display: grid;
      place-items: center;
      padding: 16px;
      box-sizing: border-box;
    }
    canvas { display: block; }
    /* Audit 2026-06-10 (WCAG 2.4.7): guarantee a visible focus indicator
       on every interactive element — Tweakpane v3 ships no :focus-visible
       styling of its own, so keyboard navigation was invisible. */
    :focus-visible {
      outline: 2px solid #8fb5ff;
      outline-offset: 1px;
    }
    /* Tweakpane panel scrolls internally instead of the document. */
    .tp-dfwv {
      max-height: calc(100vh - 16px);
      overflow-y: auto;
    }
    /* Status bar (audit 2026-06-10, WCAG 1.4.3): solid chip instead of
       55%-opacity bare text.  The old style washed out to ~2.4:1 when the
       window was short enough for the bar to overlay the cream canvas.
       #d9d2c4 on rgba(10,10,10,.82) ≥ 9:1 on any backdrop. */
    #status {
      position: fixed;
      bottom: 10px; left: 12px;
      font-size: 11px;
      color: #d9d2c4;
      background: rgba(10, 10, 10, 0.82);
      padding: 3px 9px;
      border-radius: 5px;
      pointer-events: none;
      white-space: nowrap;
    }
    #status:empty { display: none; }
    /* Fallback @font-face is injected at runtime by glyph-fonts.js; the
       snippet below only kicks in if the loader fails before injection. */
  </style>
</head>
<body aria-label="glyph-grid render canvas">
  <div id="status" role="status" aria-live="polite"></div>

  <!-- p5.js core (unchanged from v1). -->
  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.2/lib/p5.min.js"></script>
  <!-- JSZip stays as the legacy-fallback recorder; new streaming recorder
       prefers File System Access API, then fflate. -->
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fflate@0.8.2/umd/index.js"></script>

  <!-- glyph-grid skill libs (v2). All IIFEs that attach to window.GlyphGrid. -->
  <script src="lib/glyph-compat.js"></script>
  <script src="lib/glyph-fonts.js"></script>
  <script src="lib/glyph-record.js"></script>
  <script src="lib/glyph-dither.js"></script>
  <script src="lib/glyph-shape-index.js"></script>
  <script src="lib/glyph-edge.js"></script>
  <script src="lib/glyph-xdog.js"></script>
  <script src="lib/glyph-palette-morph.js"></script>
  <script src="lib/glyph-crt.js"></script>
  <!-- Wave 1 runtime (load AFTER all primitive libs; order-sensitive). -->
  <script src="lib/glyph-runtime.js"></script>
  <script src="lib/glyph-primitives.js"></script>
  <!-- Wave 2 outputs. -->
  <script src="lib/glyph-outputs.js"></script>
  <!-- Wave 3 composition. -->
  <script src="lib/glyph-composition.js"></script>
  <!-- Wave 4 sources (feedback/audio/camera/video/data/canvas/RD/CA/flow). -->
  <script src="lib/glyph-sources.js"></script>
  <!-- Wave 5 sampling topologies. -->
  <script src="lib/glyph-sampling.js"></script>
  <!-- Polish: additional colors/selections/output + palettes. -->
  <script src="lib/glyph-polish.js"></script>
  <!-- Wave 6: postprocess.crt-chain, selection.harri-faithful,
       output.webgl-canvas + perf instrumentation, source.pointer/keyboard,
       output.audio-synth. -->
  <script src="lib/glyph-wave6.js"></script>
  <!-- Tweakpane v3 (UMD) — used by lib/glyph-studio.js when CONFIG.studio.enabled = true. -->
  <script src="https://cdn.jsdelivr.net/npm/tweakpane@3.1.10/dist/tweakpane.min.js"></script>
  <script src="lib/glyph-studio.js"></script>

  <script>
  /* =================================================================
     glyph-grid v2 — single-file p5.js renderer.

     v2 adds eleven new pipeline stages behind CONFIG.compat:"v2". Every
     new stage has a gate (glyph-compat.gate*) that short-circuits if its
     own field is absent, so CONFIG.compat:"v2" with no other advanced
     fields is byte-identical to CONFIG.compat:"v1".

     Legacy contract preserved verbatim:
       - Two-layer composite: scene -> p5.Graphics (src) -> glyph grid.
       - Scene signature (g, t, config) => void.
       - `pixelDensity(1)` on both contexts.
       - Deterministic seeding via randomSeed + noiseSeed on both.
       - __glyphGridTest hook surface.

     New in v2 (all opt-in):
       - CONFIG.compat ("v1" | "v2") — single switch.
       - CONFIG.glyphSet — Unicode-16 sets (octant, sextant, braille, block).
       - CONFIG.selectionMode — brightness | shape | shape-edge-aware | edge-directional.
       - CONFIG.dither — ordered + error-diffusion dithers.
       - CONFIG.prefilter — XDoG edge styling prior to grid sampling.
       - CONFIG.postprocess — CRT, bloom, scanlines, chromatic aberration, etc.
       - CONFIG.retroMode — preset genre mode applied before user config.
       - CONFIG.renderer — "cpu" (default) | "gpu".
       - CONFIG.zones — scene-contract v2 zone-variable pipeline.
       - CONFIG.paletteMorph — OKLab interpolation across palettes over time.
       - CONFIG.recording — streaming output via File System Access API.
     ================================================================= */

  /* =================================================================
     CONFIG — defaults preserve v1 behavior. New v2 fields default to
     inactive (all gates return false).
     ================================================================= */
  const CONFIG = {
    /* --- v2 gate (single switch) --- */
    compat: 'v2',

    /* Sutskever Stage 1 — render substrate. 'cpu' (default, the proven
       canvas-2D sprite path) | 'webgl' (instanced-quad GPU path, opt-in,
       gated to the monochrome/no-postproc signature path in v1, auto
       CPU-fallback on GL failure). Stage 2 lifts the postproc gate. */
    renderer: 'cpu',

    /* --- v1 fields ---
       Canvas matches the reference photo's 1356x668 (≈2.03:1).  Grid
       220x55 ≈ 12,100 cells (cell ~5.8 × 11.5, mono-char aspect).
       Denser than the 200x50 reference grid but readable at 11px. */
    /* Microscopic-detail config — 240×120 octant grid + shape-edge-aware
       selection + ROI on the hand-and-chip area.  Effective resolution
       inside the ROI is 720×360 sub-cells via 2×4-octant encoding.
       Font family forces the bundled WOFF2 stack directly so octant
       codepoints render via unicode-range matching from frame 1
       (sidesteps the fontDescriptor-null window). */
    canvas: { w: 1024, h: 504 },
    grid: {
      /* Back to 240×120 base — the variant before the 320×160 bump.
         Cells ~4.27×4.20 px.  No ROIs (their re-sampling killed the
         per-frame breathing). Extra chip-area detail comes from a
         third sharpen pass in the preprocess focused on the chip
         rectangle, not from a higher-density grid — so no visible
         ROI boundary box. */
      cols: 240, rows: 120,
    },
    font: {
      /* size 8 paired with 4.27-px cells: chars overlap horizontally
         (94% coverage) and bleed into neighbours, dissolving column
         stripes. Inside the chip ROI the font scales down 1/bump=8/3
         ≈ 2.7px so chars fit the finer 1.42-px ROI cells. */
      family: 'monospace',
      size: 8,
    },
    /* gradient — leading spaces (rampLast cells with curved < threshold
       get the space char and skip drawing).  Required for the cream-
       paper look: bright source = paper bg shows, dark source = dense
       glyphs render.  Without leading spaces every cell drew a mark
       and the cream bg got a visible column-stripe pattern. */
    ramp: 'gradient',
    /* gamma 0.55: bright source cells reach the deep-charcoal stop
       at the top of the palette, giving high-contrast figure stipple.
       The cream-paper-bg cleanliness is handled by the hard signal
       threshold (_bgFloor) in the EMA hook, not by gamma. */
    brightnessGamma: 0.55,
    /* bgThreshold (0..1, default 0 = disabled).  When > 0, any cell whose
       source luminance is above this value is forced to signal=0 (rendered
       as palette bg / cream paper).  Lets the cream-paper sketch aesthetic
       work on bright-bg sources (white anime panels, photos with white
       backgrounds) by punching out the bright bg before it gets rendered
       as dense ink.  Set to ~0.65–0.85 for white-bg sources; leave at 0
       for the original kaneki workflow where the source is mostly dark. */
    bgThreshold: 0,
    /* invertSignal — flips bright↔dark for the brightness signal.  Default
       is bright source → ink, dark source → cream (works when source is
       mostly dark with bright accents, like the original kaneki).  When
       the source is mostly bright with dark details (white-bg portraits,
       anime panels with light hair on light bg), invertSignal: true makes
       the DARK details become the drawn ink and the bright areas become
       cream paper — giving the same selective-sketch aesthetic on
       inverted-luminance sources. */
    invertSignal: false,
    samplingStrategy: 'average',
    /* monochrome — single dark ink with alpha driven by cell signal.
       Bright cells = opaque dark char (stipple), dim cells = low
       alpha → cream paper bg shows through. Cleaner silhouette feel
       than gradient mode + multi-stop palette which produced mid-
       tone tan washes. */
    colorMode: 'monochrome',
    palette: 'cream-paper',
    scene: 'studio',
    animation: { fps: 30, duration: 6.0, loop: true },
    seed: 1337,
    record: false,

    /* --- v2 pipeline: high-density brightness mapping with gradient
       ramp.  Shape-edge-aware over octants gave gorgeous results but
       the per-cell text() rasterisation of octant codepoints hit ~5s
       on 20K cells.  With 320×160 ASCII cells the grid pattern is
       already sub-pixel from normal viewing distance, so brightness
       suffices and renders ~10× faster. */
    glyphSet: null,
    selectionMode: 'brightness',

    /* Temporal dither — Bayer8 quantization with a per-frame pixel
       offset hashed by (seed, frameIdx).  Each cell's glyph index
       shifts slightly between frames, animating the pixel grid: cells
       on quantization boundaries roll between adjacent ramp chars
       every frame. This is the "animated pixels" effect. */
    dither: { mode: 'temporal', asSourcePrefilter: true },

    /* XDoG OFF for cream-paper look — XDoG outputs near-1.0
       everywhere except edges, which makes 90% of cells "bright"
       and stipples the whole image including bg.  Direct linear
       luminance gives the correct light-figure-on-cream-paper
       mapping for this photograph.  Breathing now comes from EMA
       + temporal dither alone. */
    prefilter: { mode: 'none' },

    /* Postprocess: vignette + bloom + halation give the auric glow halo
       around the bright silver chip pixels.  depthFog tints the far
       cells (face area) toward a cool dim charcoal so the face reads
       as further away from the camera than the hand+chip. */
    /* Postprocess defaults — vignette stays on (it's cheap, ~5ms, and
       reads as a "frame" around the canvas).  bloom + halation OFF by
       default — they cost ~80–180ms each (full-canvas box-blur) and
       were carry-overs from the original showcase config, not appropriate
       for a generic studio default.  Users who want them can toggle in
       the Postprocess folder.  See PERF-BASELINE.md for the data behind
       this choice. */
    postprocess: {
      vignette: { enabled: true,  strength: 0.55 },
      bloom:    { enabled: false, radius: 2.5, strength: 0.95 },
      halation: { enabled: false, strength: 0.70 },
      depthFog: { enabled: false },
    },

    /* Depth disabled — the radial near-zone in the depth map drew
       a dark fog ring around its center, which landed on the man's
       head and read as a "hole in the head" artifact.  Removing depth
       gives back the clean charcoal-breathing look. */
    depth: { enabled: false },

    paletteMorph: null,
    recording: { mode: 'legacy' },

    /* Dispersal — stardust effect.  Each inked cell drifts in a seeded
       random direction (upward-biased) and fades out as time crosses
       startT → endT (fractions of animation.duration).  Cream-paper bg
       is naturally exempt since space-glyph cells already render nothing.
       Designed for one-shot end-of-animation effects ("dimming →
       stardust → blank paper"); for looping renders the effect resets
       at frame 0 of each loop, which can read as breathing-out. */
    dispersal: {
      enabled:     false,
      startT:      0.5,    // 0..1 fraction of duration when drift begins
      endT:        0.95,   // 0..1 fraction of duration when fully dispersed
      intensity:   0.4,    // max drift distance as fraction of canvas height
      upwardBias:  0.7,    // 0 = random direction, 1 = pure upward
      swayAmount:  0.5,    // horizontal sine wobble for organic feel (px scale)
      rippleAmt:   0.2,    // per-cell start-time jitter; 0 = all-at-once, 0.3 = 30% ripple
    },

    /* Studio UI (Tweakpane). Setting enabled:true builds a control
       panel that live-tunes everything in CONFIG. Breathing constants
       are read by the EMA hook in drawGlyphGridV2. */
    studio: {
      enabled: true,
      /* Auto-resize canvas to match the source image's aspect ratio when
         a new image loads. Caps long edge at MAX_CANVAS_LONG (1024) to
         keep render cost predictable. Set false to keep canvas at the
         CONFIG.canvas dimensions regardless of source aspect. */
      fitCanvasToImage: true,
      breathing: {
        emaAlpha:  0.35,
        gainSwing: 0.30,
        jitter:    0.05,
        pulseHz:   0.7,
      },
    },
  };

  /* =================================================================
     RAMPS — v1 legacy density strings. v2's glyphSet supersedes this
     when set.
     ================================================================= */
  const RAMPS = {
    classic: ' .\u00b7:-=+*#%@',
    dense: ' .,:;i1tfLCG08@',
    sparse: ' .:+#@',
    'unicode-block': ' \u2591\u2592\u2593\u2588',
    /* v2.1 — denser near-monotonic ramp for smooth tonal gradients
       (pairs with colorMode:"gradient") */
    gradient: '  .,:;-~+=<>*oOwmM8B#%@',
    /* No-space monotonic ramp — every cell gets a glyph. */
    gradientNoSpace: '.,:;-~+=<>*oOwmM8B#%@',
    /* No-space shaded-block ramp — every cell fills uniformly with
       a block-element character, leaving no stroke alignment for the
       grid pattern to read against.  4 brightness bands carry shading
       through duotone color lerp. */
    blockShaded: '░▒▓█',
    /* 8-step block ramp — vertical block ascender from empty to full,
       chars touch top-to-bottom across rows so cell baselines vanish. */
    blockAscend: '▁▂▃▄▅▆▇█',
    /* v2.1 — glyphs biased toward radial / diagonal strokes for
       radially-symmetric features like sandworm maw filaments */
    radial: ' .*+xX%vY',
  };

  /* =================================================================
     PALETTES — unchanged v1 set.
     ================================================================= */
  const PALETTES = {
    monochrome:    { bg: '#000000', inks: ['#FFFFFF'] },
    phosphor:      { bg: '#001100', inks: ['#33FF66', '#88FFAA'] },
    bauhaus:       { bg: '#F2EBDA', inks: ['#D62828', '#1D3557', '#F4C430'] },
    lovespark:     { bg: '#000000', inks: ['#FFB7C5', '#E91E8C', '#7FFFD4'] },
    'mono-amber':  { bg: '#1A0D00', inks: ['#FFB000'] },
    /* Mr-Robot / hacker-terminal cyan — four stops for gradient mode. */
    'cyber-phosphor': { bg: '#020609', inks: ['#EAFBFF', '#7FE9FF', '#39A4BC', '#143240'] },
    /* Amber CRT phosphor — vintage-terminal warm light. */
    'amber-phosphor': { bg: '#0A0500', inks: ['#FFEDB8', '#FFB000', '#B85E00', '#3A1A00'] },
    /* Bone-on-charcoal — hand-drawn study feel. */
    'bone-charcoal':  { bg: '#0A0907', inks: ['#F5ECDA', '#C8B89E', '#7A6B58', '#2A241D'] },
    /* Cream-paper — single deep-charcoal ink on cream paper bg.
       Used with colorMode: 'monochrome' so each char's alpha is
       driven by cell signal: dim cells → low alpha → cream shows,
       bright cells → high alpha → opaque dark stipple. */
    'cream-paper': {
      bg: '#E8DDC8',
      inks: ['#0E0805'],
    },
    /* Silver-charcoal — gradient mode interpAtU maps u=1 → stops[n-1],
       so the brightest stop must be LAST.  Order: dim charcoal → mid
       charcoal → ash → bone → silver. Chip+tweezers polygon gets
       painted bright in the scene → cells there read curved≈1 → land
       on the silver stop. */
    'silver-charcoal': {
      bg: '#0A0907',
      inks: ['#2A241D', '#7A6B58', '#C8B89E', '#F5ECDA', '#E8F2FA'],
    },
    /* Spice — Arrakis melange, ported from the paul-arrakis-spice
       piece.  inks[0] amber + inks[1] rust drive duotone lerp; inks[2]
       pale-gold + inks[3] deep-ember are used by atmospheric layers. */
    'spice':         { bg: '#0A0302', inks: ['#FFB347', '#E85D1A', '#FFE4A8', '#9C4A16'] },
    /* Kawaii-pink — soft cream→blush→hot-pink→magenta gradient. Pairs
       with the kawaii postprocess overlay (hearts + sparkles). All inks
       are perceptually-uniform-ish in OKLab so gradient colorMode reads
       as a smooth pink wash. inks[0] is the pale highlight, inks[3] the
       deepest plum. */
    'kawaii-pink':   { bg: '#FFF0F5', inks: ['#FFE4F0', '#FFB7DC', '#FF6FB8', '#C73E8E', '#7A1F4D'] },
  };

  function inkColor(config, i) {
    const inks = PALETTES[config.palette].inks;
    return inks[i % inks.length];
  }
  function bgColor(config) { return PALETTES[config.palette].bg; }

  /* =================================================================
     ASSETS
     ================================================================= */
  let sourceImg = null;       /* source image — fed by drag-drop / Pick image */
  let sparkyImg = null;       /* optional mascot used by the sparkyPortrait scene */
  function preload() {
    /* No bundled source image — the studio launches blank with a
       "Drop an image to start" placeholder. The user supplies one via
       drag-drop or the Pick image… button in the panel. */
  }

  /* =================================================================
     SCENES (v1 set preserved).
     ================================================================= */
  const SCENES = {
    caduceusHelix(g, t, config) {
      const W = g.width, H = g.height;
      g.background(bgColor(config));
      g.noFill();
      const cx = W / 2;
      const top = H * 0.08;
      const bot = H * 0.92;
      const amplitude = W * 0.18;
      const turns = 5.5;
      const speed = (Math.PI * 2) / config.animation.duration;
      const samples = 320;
      g.stroke(inkColor(config, 0));
      g.strokeWeight(2.5);
      g.line(cx, top, cx, bot);
      for (let helix = 0; helix < 2; helix++) {
        g.stroke(inkColor(config, 1 + helix));
        g.strokeWeight(2);
        const phase = helix * Math.PI;
        g.beginShape();
        for (let i = 0; i <= samples; i++) {
          const u = i / samples;
          const y = top + u * (bot - top);
          const angle = u * turns * Math.PI * 2 + phase + t * speed;
          const x = cx + Math.cos(angle) * amplitude;
          g.vertex(x, y);
        }
        g.endShape();
      }
      const bandTop = top + (bot - top) * 0.18;
      const bandBot = top + (bot - top) * 0.32;
      const bandLeft = cx - amplitude * 1.6;
      const bandRight = cx + amplitude * 1.6;
      const dashes = 180;
      g.strokeWeight(1);
      for (let i = 0; i < dashes; i++) {
        const fx = bandLeft + (bandRight - bandLeft) * (i / dashes);
        const fy = bandTop + (bandBot - bandTop) * g.noise(i * 0.13, t * 0.5);
        const a = g.noise(i * 0.07, t * 0.3 + 100) * 255;
        const c = g.color(inkColor(config, 0));
        c.setAlpha(a);
        g.stroke(c);
        g.line(fx, fy, fx + 2.5, fy);
      }
    },

    flowField(g, t, config) {
      const W = g.width, H = g.height;
      g.background(bgColor(config));
      g.noFill();
      g.strokeWeight(1.2);
      const lines = 220;
      const stepsPerLine = 60;
      const stepSize = 6;
      const noiseScale = 0.0035;
      const tDrift = t * 0.15;
      for (let i = 0; i < lines; i++) {
        const sx = ((i * 73) % 13) / 13 * W * 0.07 + (i / lines) * W;
        const sy = ((i * 31) % 11) / 11 * H * 0.07 + ((i * 17) % lines) / lines * H;
        let x = sx % W;
        let y = sy % H;
        g.stroke(inkColor(config, i % 3));
        g.beginShape();
        for (let s = 0; s < stepsPerLine; s++) {
          if (x < 0 || x > W || y < 0 || y > H) break;
          g.vertex(x, y);
          const angle = g.noise(x * noiseScale, y * noiseScale, tDrift) * Math.PI * 4;
          x += Math.cos(angle) * stepSize;
          y += Math.sin(angle) * stepSize;
        }
        g.endShape();
      }
    },

    sparkyPortrait(g, t, config) {
      const W = g.width, H = g.height;
      g.background(bgColor(config));
      const speed = (Math.PI * 2) / config.animation.duration;
      const loopPhase = t * speed;
      const sparkleCount = 60;
      g.strokeCap(g.ROUND ?? 'round');
      for (let i = 0; i < sparkleCount; i++) {
        const seed = i * 97 + 13;
        const baseX = ((seed * 53) % 1000) / 1000 * W;
        const baseY = ((seed * 31) % 1000) / 1000 * H;
        const drift = (baseY - (t / config.animation.duration) * H) % H;
        const y = drift < 0 ? drift + H : drift;
        const twinkle = (Math.sin(loopPhase * 3 + i * 0.7) + 1) / 2;
        const size = 3 + twinkle * 9;
        const c = g.color(inkColor(config, 2));
        c.setAlpha(60 + twinkle * 195);
        g.stroke(c);
        g.strokeWeight(1.4);
        g.line(baseX - size / 2, y, baseX + size / 2, y);
        g.line(baseX, y - size / 2, baseX, y + size / 2);
      }
      const heartCount = 14;
      g.noStroke();
      for (let i = 0; i < heartCount; i++) {
        const seed = i * 211 + 7;
        const orbitR = (((seed * 17) % 1000) / 1000) * W * 0.42 + W * 0.08;
        const orbitSpeed = 0.3 + ((seed % 7) / 7) * 0.6;
        const orbitPhase = loopPhase * orbitSpeed + i * 0.9;
        const cx = W / 2 + Math.cos(orbitPhase) * orbitR;
        const cy = H / 2 + Math.sin(orbitPhase * 1.3) * orbitR * 0.55;
        const r = 8 + ((seed * 11) % 12);
        const c = g.color(inkColor(config, 1));
        c.setAlpha(110);
        g.fill(c);
        g.ellipse(cx - r * 0.5, cy - r * 0.25, r, r);
        g.ellipse(cx + r * 0.5, cy - r * 0.25, r, r);
        g.triangle(cx - r, cy, cx + r, cy, cx, cy + r * 1.15);
      }
      const bob = Math.sin(loopPhase) * H * 0.018;
      const centerX = W / 2;
      const centerY = H / 2 + bob;
      if (sparkyImg && sparkyImg.width > 0) {
        const target = Math.min(W, H) * 0.70;
        const imgAspect = sparkyImg.width / sparkyImg.height;
        let drawW, drawH;
        if (imgAspect >= 1) { drawW = target; drawH = target / imgAspect; }
        else { drawH = target; drawW = target * imgAspect; }
        g.imageMode(g.CENTER);
        g.image(sparkyImg, centerX, centerY, drawW, drawH);
        g.imageMode(g.CORNER);
      } else {
        const r = Math.min(W, H) * 0.22;
        const pink = g.color(inkColor(config, 0));
        g.noStroke(); g.fill(pink);
        g.ellipse(centerX, centerY, r * 2, r * 2);
        const cyan = g.color(inkColor(config, 2));
        g.noFill(); g.stroke(cyan); g.strokeWeight(3);
        g.ellipse(centerX, centerY, r * 2.3, r * 2.3);
      }
    },

    /* v2.1 smoke-test scene — paints a horizontal luminance gradient
       into `g` and returns a depth map where the left half is near
       (1.0) and the right half is far (0.0).  Used to verify depth-fog
       and god-rays stages end-to-end. */
    depthSmoke(g, t, config) {
      const W = g.width, H = g.height;
      g.background(bgColor(config));
      g.noStroke();
      for (let y = 0; y < H; y += 4) {
        for (let x = 0; x < W; x += 4) {
          const u = x / W;
          const shade = Math.round(40 + u * 215);
          g.fill(shade, shade, shade);
          g.rect(x, y, 4, 4);
        }
      }
      if (!config.depth || !config.depth.enabled) return;
      if (!this.__smokeDepth) this.__smokeDepth = createGraphics(W, H);
      const d = this.__smokeDepth;
      d.noStroke();
      for (let x = 0; x < W; x += 4) {
        const u = x / W;
        const r = Math.round((1 - u) * 255);  /* left=near(1), right=far(0) */
        d.fill(r, 0, 0);
        d.rect(x, 0, 4, H);
      }
      return { depth: d };
    },

    /* Photographic image-overlay scene (Paul-arrakis-spice style):
       just the photograph + atmospheric drifting motes + soft warm
       haze + faint starfield.  No HUD, no reticle, no scan bands —
       the image carries the composition. */
    studio(g, t, config) {
      const W = g.width, H = g.height;
      const loopPhase = (t / config.animation.duration) * Math.PI * 2;
      const u = ((t / config.animation.duration) % 1 + 1) % 1;
      const chipX = W * 0.50;
      const chipY = H * 0.50;
      const minWH = Math.min(W, H);

      /* Pass 2B — XDoG sigma sweep. Mutates CONFIG.prefilter.sigma so
         the DoG kernel breathes across the loop. The skill's xdog
         reads CONFIG.prefilter.sigma per draw; we just have to set it
         here. Range stays in [0.65, 1.05] per references/xdog.md. */
      if (config.prefilter && config.prefilter.mode === 'xdog') {
        const sigmaBase = 0.85, sigmaSwing = 0.20;
        config.prefilter.sigma = sigmaBase + sigmaSwing * Math.sin(loopPhase);
      }

      g.background(bgColor(config));

      /* ----- 1. base image preprocess: contrast stretch + 3×3 unsharp
                  mask + targeted face-region boost. Cached. The unsharp
                  mask lifts blurred face features (eye, nose, mouth)
                  enough that they survive the per-cell averaging at
                  the chosen grid density. Face zone (upper half) gets
                  an extra contrast boost on top. ----- */
      if (sourceImg && sourceImg.width > 0) {
        /* Animated-source cache invalidation. window.__sourceFrameIdx is
           updated each frame by draw() (see ANIMATED-SOURCE PLAYBACK
           block above).  -1 means "static image, never changes"; any
           non-negative value is the current GIF frame.  When the value
           changes between renders, the cached preprocessed image is
           stale — drop it so the unsharp mask runs against the new
           source frame. */
        const _curFrame = (typeof window.__sourceFrameIdx === 'number') ? window.__sourceFrameIdx : -1;
        if (this.__sourceProcessed && this.__sourceProcessedFrame !== _curFrame) {
          this.__sourceProcessed = null;
        }
        if (!this.__sourceProcessed) {
          const W0 = sourceImg.width, H0 = sourceImg.height;
          const buf = createGraphics(W0, H0);
          buf.pixelDensity(1);
          buf.image(sourceImg, 0, 0);
          buf.loadPixels();
          const px = buf.pixels;
          /* Step A — copy luminance into a flat array for a 3×3 box blur,
             cheaper than 2D Gaussian and good enough for unsharp mask. */
          const lum = new Float32Array(W0 * H0);
          for (let i = 0, j = 0; j < lum.length; i += 4, j++) {
            lum[j] = 0.2126 * px[i] + 0.7152 * px[i + 1] + 0.0722 * px[i + 2];
          }
          const blur = new Float32Array(W0 * H0);
          for (let y = 1; y < H0 - 1; y++) {
            for (let x = 1; x < W0 - 1; x++) {
              const idx = y * W0 + x;
              blur[idx] = (
                lum[idx - W0 - 1] + lum[idx - W0] + lum[idx - W0 + 1] +
                lum[idx - 1]      + lum[idx]      + lum[idx + 1] +
                lum[idx + W0 - 1] + lum[idx + W0] + lum[idx + W0 + 1]
              ) / 9;
            }
          }
          /* Step B — apply unsharp mask + global contrast + face-zone
             boost in a single pass. Constants tuned visually:
               gainGlobal = 1.55 — mid-tone stretch around 128
               gainFace   = 1.18 — extra boost on upper third of image
               sharpen    = 1.10 — unsharp mask amount (hi-pass added back) */
          const gainGlobal = 1.55, midpoint = 128;
          const sharpenGlobal = 1.10;
          /* Face zone gets stronger sharpening + 1.12× gain so eye,
             nose, mouth read as distinct features at our 1.7-px
             effective cell density.  Trade-off vs depth fog: 1.12
             gain is enough for visible features but allows fog to
             still recede the face plane. */
          const sharpenFace  = 1.85;
          const gainFace     = 1.12;
          const faceY1 = Math.round(H0 * 0.45);
          for (let y = 0; y < H0; y++) {
            const inFace = y < faceY1;
            const gain    = inFace ? gainGlobal * gainFace : gainGlobal;
            const sharpen = inFace ? sharpenFace : sharpenGlobal;
            for (let x = 0; x < W0; x++) {
              const idx = y * W0 + x;
              const o = idx * 4;
              const hi = (lum[idx] - blur[idx]) * sharpen;
              for (let ch = 0; ch < 3; ch++) {
                let v = px[o + ch] + hi;
                v = (v - midpoint) * gain + midpoint;
                px[o + ch] = v < 0 ? 0 : v > 255 ? 255 : v;
              }
            }
          }
          /* Second sharpen pass over the face zone using a tighter 5-tap
             cross kernel — captures higher-frequency detail (eye lashes,
             lip outline, nostril) that the 3×3 blur smoothed past. */
          const lum2 = new Float32Array(W0 * H0);
          for (let i = 0, j = 0; j < lum2.length; i += 4, j++) {
            lum2[j] = 0.2126 * px[i] + 0.7152 * px[i + 1] + 0.0722 * px[i + 2];
          }
          const blur2 = new Float32Array(W0 * H0);
          for (let y = 1; y < H0 - 1; y++) {
            for (let x = 1; x < W0 - 1; x++) {
              const idx = y * W0 + x;
              blur2[idx] = (lum2[idx] + lum2[idx - 1] + lum2[idx + 1] + lum2[idx - W0] + lum2[idx + W0]) / 5;
            }
          }
          const fineSharpen = 0.75;
          for (let y = 0; y < faceY1; y++) {
            for (let x = 0; x < W0; x++) {
              const idx = y * W0 + x;
              const o = idx * 4;
              const hi = (lum2[idx] - blur2[idx]) * fineSharpen;
              for (let ch = 0; ch < 3; ch++) {
                let v = px[o + ch] + hi;
                px[o + ch] = v < 0 ? 0 : v > 255 ? 255 : v;
              }
            }
          }
          /* (Inversion removed.) */

          /* Three soft-mask zones — chip head, tweezer axis, hand body.
             All three blend smoothly into the surrounding image so no
             visible boundaries.  The skill's preprocess receives a
             per-pixel weight from each mask and applies a combined
             sharpen + gain for that pixel.  Mask anchors (source
             normalized):
                chip tip:        (0.59, 0.42)
                tweezer base:    (0.32, 0.70)
                hand centre:     (0.22, 0.80) — palm/finger cluster
          */
          const tipX  = W0 * 0.59, tipY  = H0 * 0.42;
          const baseX = W0 * 0.32, baseY = H0 * 0.70;
          const handX = W0 * 0.22, handY = H0 * 0.80;
          const dx_axis = baseX - tipX, dy_axis = baseY - tipY;
          const axisLen = Math.sqrt(dx_axis * dx_axis + dy_axis * dy_axis);
          const ux = dx_axis / axisLen, uy = dy_axis / axisLen;
          const bandHalf = W0 * 0.18;
          const bandFlat = W0 * 0.04;
          const chipRadius = W0 * 0.07;
          /* Hand zone: elliptical (taller than wide), softer falloff so
             knuckle / fingernail / finger creases get amplified gradually
             across the whole hand without a visible perimeter. */
          const handRx = W0 * 0.20;       /* x-axis of mask ellipse — fully fades here */
          const handRy = H0 * 0.34;       /* y-axis of mask ellipse */
          const handFlatR = 0.40;         /* normalized radius staying at full weight */

          const lumChip = new Float32Array(W0 * H0);
          for (let i = 0, j = 0; j < lumChip.length; i += 4, j++) {
            lumChip[j] = 0.2126 * px[i] + 0.7152 * px[i + 1] + 0.0722 * px[i + 2];
          }
          const blurChip = new Float32Array(W0 * H0);
          for (let y = 1; y < H0 - 1; y++) {
            for (let x = 1; x < W0 - 1; x++) {
              const idx = y * W0 + x;
              blurChip[idx] = (
                lumChip[idx] + lumChip[idx - 1] + lumChip[idx + 1] +
                lumChip[idx - W0] + lumChip[idx + W0]
              ) / 5;
            }
          }
          /* Per-zone parameters */
          const sharpAxis  = 1.30;
          const sharpChip  = 2.10;
          const sharpHand  = 1.45;        /* between tweezer and chip — the hand has lots of mid-tone detail */
          const gainAxis   = 1.18;
          const gainChip   = 1.45;
          const gainHand   = 1.30;        /* lifts skin shading + finger creases */
          const midpoint2  = 110;
          for (let y = 0; y < H0; y++) {
            for (let x = 0; x < W0; x++) {
              /* axis weight (chip+tweezer line) */
              let axisW = 0, chipW = 0;
              const dx_tip = x - tipX, dy_tip = y - tipY;
              const t = dx_tip * ux + dy_tip * uy;
              if (t >= -W0 * 0.06 && t <= axisLen + W0 * 0.04) {
                const projX = tipX + t * ux, projY = tipY + t * uy;
                const perp = Math.hypot(x - projX, y - projY);
                if (perp < bandHalf) {
                  axisW = perp <= bandFlat ? 1.0 : 1.0 - (perp - bandFlat) / (bandHalf - bandFlat);
                }
                const dTip = Math.hypot(dx_tip, dy_tip);
                chipW = dTip <= chipRadius
                  ? 1.0
                  : Math.max(0, 1 - (dTip - chipRadius) / chipRadius);
              }
              /* hand zone weight: elliptical falloff centred on hand */
              const ndx = (x - handX) / handRx;
              const ndy = (y - handY) / handRy;
              const ellipseR = Math.sqrt(ndx * ndx + ndy * ndy);
              let handW = 0;
              if (ellipseR < 1.0) {
                handW = ellipseR <= handFlatR
                  ? 1.0
                  : 1.0 - (ellipseR - handFlatR) / (1.0 - handFlatR);
              }
              if (axisW === 0 && chipW === 0 && handW === 0) continue;
              /* combine mask weights additively but cap at 1.0 per
                 amount so the chip's strong sharpen dominates only at
                 the chip head, gentler in surrounds. */
              const baseSharpen = Math.min(1, axisW + handW) * 0;
              const sharpenContrib = (sharpAxis * axisW) + (sharpChip - sharpAxis) * chipW + (sharpHand * handW);
              const gainContrib = 1.0 + (gainAxis - 1) * axisW + (gainChip - gainAxis) * chipW + (gainHand - 1) * handW;
              const idx = y * W0 + x;
              const o = idx * 4;
              const hi = (lumChip[idx] - blurChip[idx]) * sharpenContrib;
              for (let ch = 0; ch < 3; ch++) {
                let v = px[o + ch] + hi;
                v = (v - midpoint2) * gainContrib + midpoint2;
                px[o + ch] = v < 0 ? 0 : v > 255 ? 255 : v;
              }
            }
          }
          buf.updatePixels();
          this.__sourceProcessed = buf;
          this.__sourceProcessedFrame = _curFrame;
        }
        const srcImg = this.__sourceProcessed;
        const imgAspect = srcImg.width / srcImg.height;
        const canvasAspect = W / H;
        let dw, dh, dx, dy;
        if (imgAspect > canvasAspect) {
          dh = H; dw = H * imgAspect;
          dx = (W - dw) / 2; dy = 0;
        } else {
          dw = W; dh = W / imgAspect;
          dx = 0; dy = (H - dh) / 2;
        }
        g.imageMode(g.CORNER);
        g.image(srcImg, dx, dy, dw, dh);
      } else {
        g.noStroke(); g.fill(40, 60, 70);
        g.rect(W * 0.4, H * 0.3, W * 0.2, H * 0.4);
      }

      /* (Atmospheric layers removed for cream-paper aesthetic — the
         breathing brightness overlay, starfield, and drifting motes
         all painted cream/light dots on the canvas which the cell
         sampler picked up as signal, "fogging" the bg with stipple
         and washing out the figure-vs-paper contrast. The pixels-
         themselves-breathe effect now comes from cellSignalEma +
         temporal dither alone — no overlay tinting required.) */

      /* (Layers 4/5/6 removed — Pass 1:
            heart-pulse + scan band + warm halo all rendered at
            canvas centre or as a top→bottom sliding line. The
            user identified them as "line going down" + "hole in
            the head" artifacts. The substrate breathes via cell-
            level techniques in Pass 2 instead of overlay pulses.) */

      /* ----- 7. depth map: chip near (1.0), hand mid-near (0.75), face
                  far (0.20), corners fully fogged (0.0).  depthFog post
                  stage tints far cells toward the cool fog colour,
                  pushing the face into atmospheric haze.  Cached. ----- */
      if (config.depth && config.depth.enabled) {
        if (!this.__sourceDepth) {
          this.__sourceDepth = createGraphics(W, H);
          const d = this.__sourceDepth;
          d.background(0);
          d.noStroke();
          /* face / upper background — push to 0.10 (very far) so depth
             fog tints heavily and the face recedes behind the chip. */
          d.fill(26, 0, 0);
          d.rect(0, 0, W, H * 0.40);
          /* hand band — 0.72 (mid-foreground, less than chip's 1.0) */
          d.fill(184, 0, 0);
          d.rect(0, H * 0.50, W, H * 0.50);
          /* chip + tweezers focal area — radial near-zone (1.0 → 0
             falloff). No more polygon since silver paint is removed;
             the depth map just keeps the focal area in the
             foreground for depth-fog purposes. */
          const dSteps = 30;
          const dMaxR = minWH * 0.34;
          for (let i = dSteps; i > 0; i--) {
            const k = i / dSteps;
            const r = k * dMaxR;
            const v = Math.round((1 - k * k) * 255);
            d.fill(v, 0, 0);
            d.ellipse(W * 0.55, H * 0.50, r * 2, r * 2);
          }
          /* corner falloff — push margins to fully fogged */
          d.fill(0, 0, 0, 70);
          d.rect(0, 0, W * 0.10, H);
          d.rect(W * 0.90, 0, W * 0.10, H);
          d.rect(0, 0, W, H * 0.06);
          d.rect(0, H * 0.94, W, H * 0.06);
        }
        return { depth: this.__sourceDepth };
      }
    },

    concentricRings(g, t, config) {
      const W = g.width, H = g.height;
      g.background(bgColor(config));
      g.noFill();
      g.strokeWeight(1.5);
      const cx = W / 2, cy = H / 2;
      const ringCount = 28;
      const maxR = Math.min(W, H) * 0.46;
      const segments = 220;
      const speed = (Math.PI * 2) / config.animation.duration;
      for (let r = 0; r < ringCount; r++) {
        const baseR = (r + 1) / ringCount * maxR;
        const waveAmp = baseR * 0.06;
        const waveFreq = 4 + (r % 5);
        const phase = t * speed + r * 0.21;
        g.stroke(inkColor(config, r % 3));
        g.beginShape();
        for (let s = 0; s <= segments; s++) {
          const a = (s / segments) * Math.PI * 2;
          const radius = baseR + Math.sin(a * waveFreq + phase) * waveAmp;
          const x = cx + Math.cos(a) * radius;
          const y = cy + Math.sin(a) * radius;
          g.vertex(x, y);
        }
        g.endShape();
      }
    },
  };

  /* =================================================================
     p5 sketch — global mode.
     ================================================================= */
  let src;
  let recState = null;
  let streamRecorder = null;       /* v2 streaming recorder, if active */
  let crtState = null;              /* phosphor-decay state, if active */
  let glyphAtlas = null;            /* shape-vector atlas, if loaded */
  let fontDescriptor = null;        /* glyph-fonts.load result */
  let retroResolved = null;         /* retro-merged CONFIG, if modeset */
  let gradientStopsCache = null;    /* { key, stops } — parsed OKLab stops for gradient colorMode */
  let sceneResult = null;           /* captured scene return: { zones?, depth? } */
  let depthImg = null;              /* current scene's depth p5.Graphics (R channel = depth) */
  let currentCellDepth = -1;        /* sentinel; v2 draw loops set this per-cell to feed depth fog */
  const statusEl = () => document.getElementById('status');

  /* ---- per-frame scratch buffers, sized once in setup() ---- */
  let lumBuf = null;      /* Float32Array, linear luminance over src */
  let cellSignal = null;  /* Float32Array, per-cell brightness in [0,1] */
  let cellSignalEma = null;  /* Float32Array, per-cell EMA — pixel breathing */
  let cellCpGrid = null;  /* Uint16Array, per-cell chosen codepoint/idx */
  let cellDepth = null;   /* Float32Array, per-cell depth in [0,1] (v2.1 depth channel) */
  /* F10 — persistent ditherOpts object reused across all frames in
     the dither dispatch.  Mutated in place each frame, never replaced. */
  const _persistentDitherOpts = {
    mode: 'temporal', levels: 16, seed: 1337, frameIdx: 0, asSourcePrefilter: true,
  };

  function setup() {
    createCanvas(CONFIG.canvas.w, CONFIG.canvas.h);
    pixelDensity(1);
    /* a11y (audit 2026-06-10): the p5 canvas is the app's primary
       content; without a role/name VoiceOver announces nothing. */
    try {
      const _cv = document.querySelector('canvas');
      if (_cv) {
        _cv.setAttribute('role', 'img');
        _cv.setAttribute('aria-label',
          'Live glyph-grid render of the loaded image. Controls are in the glyph studio panel.');
      }
    } catch (e) {}
    src = createGraphics(CONFIG.canvas.w, CONFIG.canvas.h);
    src.pixelDensity(1);

    /* Determinism: same seed -> same output (verified in v1). */
    randomSeed(CONFIG.seed); noiseSeed(CONFIG.seed);
    src.randomSeed(CONFIG.seed); src.noiseSeed(CONFIG.seed);

    textFont(CONFIG.font.family);
    textSize(CONFIG.font.size);
    textAlign(CENTER, CENTER);
    frameRate(CONFIG.animation.fps);
    background(bgColor(CONFIG));

    /* v2 font preload — non-blocking; v1 draw paths don't depend on it.
       Stage 2A: trust the user's explicit glyphSet choice; skip cascade fallback
       so octants/sextants/braille actually paint when the WOFF2 is slow to decode. */
    if (window.GlyphGrid && GlyphGrid.fonts && GlyphGrid.compat.isV2(CONFIG)) {
      const requested = CONFIG.glyphSet || 'ascii';
      GlyphGrid.fonts.load({
        sizePx: CONFIG.font.size,
        glyphSet: requested,
        trustRequested: requested !== 'ascii',
      }).then(function (d) { fontDescriptor = d; });
    }

    /* F6 — pre-warm shape-vector atlases in parallel. Eliminates the
       200-500ms freeze the FIRST time a user switches to shape-edge-aware
       with a non-default glyphSet (octant / sextant / braille / etc.).
       After this, every subsequent atlas switch is an instant pointer-swap
       from cache. ~50 KB total network at startup; fire-and-forget. */
    if (window.GlyphGrid && GlyphGrid.shapeIndex) {
      prewarmAllAtlases();
    }

    /* Allocate per-frame buffers. */
    lumBuf = new Float32Array(CONFIG.canvas.w * CONFIG.canvas.h);
    cellSignal = new Float32Array(CONFIG.grid.cols * CONFIG.grid.rows);
    cellCpGrid = new Uint16Array(CONFIG.grid.cols * CONFIG.grid.rows);
    cellDepth = new Float32Array(CONFIG.grid.cols * CONFIG.grid.rows);

    /* v2 post-process state. */
    if (window.GlyphGrid && GlyphGrid.compat.isV2(CONFIG) && GlyphGrid.compat.gatePostprocess(CONFIG)) {
      crtState = GlyphGrid.crt.makeState(CONFIG.canvas.w, CONFIG.canvas.h);
    }

    /* v2 validators — warn loudly on known-bad combos. */
    if (window.GlyphGrid && GlyphGrid.compat.isV2(CONFIG)) {
      const issues = GlyphGrid.compat.validate(CONFIG);
      for (const it of issues) {
        if (it.level === 'warn' && console && console.warn) console.warn('[glyph-grid ' + it.code + '] ' + it.message);
        if (it.level === 'error') throw new Error('[glyph-grid ' + it.code + '] ' + it.message);
      }
    }

    if (CONFIG.record) {
      recState = {
        zip: new JSZip(),
        frameIdx: 0,
        total: Math.max(1, Math.round(CONFIG.animation.duration * CONFIG.animation.fps)),
        done: false,
      };
    }

    /* Wave 1: expose v1 host helpers so runtime primitives can reach into
       the p5 environment without duplicating code. Only populated once. */
    if (window.GlyphGrid && window.GlyphGrid.runtime && !window.GlyphGrid.v1) {
      window.GlyphGrid.v1 = Object.freeze({
        srcGraphics: function () { return src; },
        outputCanvas: function () {
          /* p5 writes to the main <canvas>; locate it. */
          return document.querySelector('canvas');
        },
        linearizeToLuminance: linearizeToLuminance,
      });
    }
    /* Wave 1: if a piece has declared window.PIPELINE, allocate scratch pool
       for registered primitives. Harmless if PIPELINE is absent. */
    if (window.PIPELINE && window.GlyphGrid && window.GlyphGrid.runtime) {
      try {
        window.GlyphGrid.runtime.initPool(
          CONFIG.canvas.w, CONFIG.canvas.h,
          (CONFIG.grid && CONFIG.grid.cols) || 80,
          (CONFIG.grid && CONFIG.grid.rows) || 40
        );
      } catch (e) {
        console.error('[glyph-grid runtime init] ' + (e.message || e));
      }
    }
  }

  /* =========================================================================
     Auto-fit canvas to source image aspect ratio.

     Default canvas dims (CONFIG.canvas = 1024×504) are 2:1, which crops any
     image that isn't exactly 2:1 — Sparky 612×408 (3:2) loses ear-tips +
     bunny slipper feet because the studio scene's COVER fit clips overflow.

     This helper resizes the canvas + all canvas-pixel-sized buffers (src
     graphics, lumBuf, crtState) to match the loaded image's aspect ratio.
     Long-edge capped at MAX_CANVAS_LONG so render cost stays bounded;
     short-edge floored at MIN_CANVAS_SHORT to avoid pathologically thin
     canvases for ultra-wide panoramas. Both rounded to even numbers so
     cell math + dither tiles align cleanly.

     Cell-grid-sized buffers (cellSignal, cellCpGrid, cellDepth,
     cellSignalEma) are independent of canvas pixels — they auto-realloc
     on grid change via the existing safety check in drawGlyphGridV2,
     and the EMA-preservation logic from BUG-001's fix means breathing
     extends/contracts gracefully across a resize without flat-resetting.

     Disable via CONFIG.studio.fitCanvasToImage = false. */
  const MAX_CANVAS_LONG = 1024;
  const MIN_CANVAS_SHORT = 256;

  function fitCanvasToImage(img) {
    if (!img || !img.width || !img.height) return;
    if (CONFIG.studio && CONFIG.studio.fitCanvasToImage === false) return;

    const aspect = img.width / img.height;
    let cw, ch;
    if (aspect >= 1) {
      cw = MAX_CANVAS_LONG;
      ch = Math.max(MIN_CANVAS_SHORT, Math.round(MAX_CANVAS_LONG / aspect));
    } else {
      ch = MAX_CANVAS_LONG;
      cw = Math.max(MIN_CANVAS_SHORT, Math.round(MAX_CANVAS_LONG * aspect));
    }
    cw -= cw % 2;
    ch -= ch % 2;

    if (cw === CONFIG.canvas.w && ch === CONFIG.canvas.h) return; // no-op

    CONFIG.canvas.w = cw;
    CONFIG.canvas.h = ch;
    try { resizeCanvas(cw, ch); } catch (e) {
      console.warn('fitCanvasToImage: resizeCanvas failed', e);
      return;
    }

    /* Recreate canvas-pixel-sized buffers. */
    src = createGraphics(cw, ch);
    src.pixelDensity(1);
    lumBuf = new Float32Array(cw * ch);

    /* Reset crtState — it captures persistent per-pixel buffers at the
       OLD size, so we drop it and let the v2 advanced pipeline lazy-init
       it at the new size on next frame. One-frame visual blip on resize
       (phosphorDecay state lost) is an acceptable tradeoff. */
    if (window.GlyphGrid && GlyphGrid.crt && GlyphGrid.compat
        && GlyphGrid.compat.isV2(CONFIG)
        && GlyphGrid.compat.gatePostprocess(CONFIG)) {
      crtState = GlyphGrid.crt.makeState(cw, ch);
    } else {
      crtState = null;
    }

    /* Clear scene cache so preprocess re-runs at the new dims. */
    if (window.SCENES) {
      for (const name in window.SCENES) {

    const srcW = g.width;
    const srcH = g.height;

    const gamma = CONFIG.brightnessGamma;

      for (let col = 0; col < cols; col++) {

        const y0 = Math.floor(row * cellH);

        text(ch, cx, cy);

      return 'rgb(' + rgb[0] + ',' + rgb[1] + ',' + rgb[2] + ')';
    }, MULTITINT_STEPS);
    _glyphGradientSprite = sprite;
    _glyphGradientKey = key;
    return sprite;
  }

  /* Ramp sprite atlas — sibling of _ensureSpriteAtlas but keyed on a
     plain RAMPS string rather than a glyphAtlas object.  Used by the
     drawBrightnessGrid monochrome fast path: pre-rasterise each ramp
     character once, then per-cell rendering becomes a drawImage blit.
     Same expected speedup as the shape-mode sprite atlas (~8× faster
     draw stage).  Cached by (rampStr, fontFamily, fontSize, fillColor);
     rebuilt only when any of those changes (palette switch, ramp
     change, font-size slider, etc.). */
  let _rampSprite = null;
  let _rampSpriteKey = null;
  /* Bit-mask of which ramp indices are space (skip drawImage for those). */
  let _rampSpriteSpaceMask = null;
  function _ensureRampSprite(rampStr, fontFamily, fontSizePx, fillColor) {
    if (!rampStr || rampStr.length === 0) return null;
    const key = 'ramp:' + rampStr + '|' + fontFamily + '|' + fontSizePx + '|' + fillColor;
    if (_rampSpriteKey === key && _rampSprite) return _rampSprite;
    const N = rampStr.length;

    const tileH = Math.max(2, Math.ceil(fontSizePx * 1.4));

    canvas.height = tileH;

      ctx.fillText(ch, i * tileW + tileW * 0.5, tileH * 0.5);

    _rampSprite = { canvas: canvas, tileW: tileW, tileH: tileH, halfW: tileW * 0.5, halfH: tileH * 0.5 };

    _rampSpriteSpaceMask = mask;
    return _rampSprite;
  }

  /* Gradient color LUT — 256 RGB triples precomputed once per palette/mode/
     curve change. Replaces 28,800 × interpAtU(stops, u) calls per frame
     (each one allocating ~5 objects via _blendOne) with a Uint8Array lookup.
     Rebuilt only when the palette stops, blend mode, or curve exponent
     changes — all cheap state to hash. */

  let _gradColorLutKey = null;

      const s = stops[i].srgb;
      stopKey += s[0] + ',' + s[1] + ',' + s[2] + ';';
    }

    if (_gradColorLutKey === key) return;
    const flat = curveExp === 1.0;
    for (let i = 0; i < 256; i++) {
      const v = i / 255;
      const u = flat ? v : Math.pow(v, curveExp);
      const rgb = GlyphGrid.paletteMorph.interpAtU(stops, u, mode);
      const o = i * 3;
      _gradColorLut[o]     = rgb[0];
      _gradColorLut[o + 1] = rgb[1];

  /* Sutskever Stage 1 — WebGL instanced-grid path (opt-in, gated).
     `_glOk` latches false on the first GL exception for the session, so
     a failed/absent GL context permanently falls back to the proven CPU
     path. `_glCanvas` is a detached canvas the renderer draws into; its
     result is composited onto the p5 canvas with one drawImage
     (GPU→GPU, ~0 ms per ITER-015). Scope of v1: the signature path only
     — monochrome + brightness selection + no depthFog + no dispersal +
     no imgData postproc stage (the readback trap). Anything else falls
     through to the unchanged CPU code below. */
  let _glOk = true;
  let _glCanvas = null;
  let _glInstPos = null, _glGlyphIdx = null, _glColor = null;  // grow-only

  function _glEnsureBuffers(n) {
    if (!_glInstPos || _glInstPos.length < n * 4) {
      _glInstPos = new Float32Array(n * 4);
      _glColor   = new Float32Array(n * 3);
    }
    if (!_glGlyphIdx || _glGlyphIdx.length < n) {
      _glGlyphIdx = new Float32Array(n);
    }
  }

  /* Returns true if it rendered via WebGL (caller returns), false to
     fall through to the CPU path. Never throws — GL failure latches
     _glOk=false and returns false. */
  function drawGridWebGL(cellIndex, signal, cols, rows, cellW, cellH,
                         palette, ramp, rampLast) {
    try {
      const wave6 = window.GlyphGrid && window.GlyphGrid.wave6;
      if (!wave6) { _glOk = false; return false; }
      const W = width | 0, H = height | 0;
      if (!_glCanvas) _glCanvas = document.createElement('canvas');
      if (_glCanvas.width !== W || _glCanvas.height !== H) {
        _glCanvas.width = W; _glCanvas.height = H;
      }
      const fontPx = CONFIG.font.size;
      const fam = fontFamilyForActive();
      // Atlas tile ~ the CPU sprite tile metrics so glyph size matches.
      const aCW = Math.max(4, Math.ceil(fontPx * 1.1));
      const aCH = Math.max(4, Math.ceil(fontPx * 1.4));
      const r = wave6.make(_glCanvas, ramp, fam, fontPx, aCW, aCH);

      const N = cols * rows;
      _glEnsureBuffers(N);
      const instPos = _glInstPos, glyphIdx = _glGlyphIdx, color = _glColor;
      const cw = W / cols, ch = H / rows;
      // monochrome: glyph stamped in ink, intensity = curved*1.1 folded
      // into the per-cell colour as bg→ink lerp (the shader has no
      // per-cell alpha; pre-dimming the colour reproduces the CPU
      // globalAlpha=curved*1.1 look exactly).
      const ink = (palette.inks && palette.inks[0]) || '#000';
      const _ic = _hexToRgb(ink);
      const inkR = _ic[0], inkG = _ic[1], inkB = _ic[2];
      for (let rr = 0; rr < rows; rr++) {
        const rowI = rr * cols;
        for (let c = 0; c < cols; c++) {
          const i = rowI + c;
          const sigI = signal[i];
          const sigQ = sigI < 0 ? 0 : (sigI > 1 ? 1 : sigI);
          const curved = _gammaLut[(sigQ * 255) | 0];
          let idx;
          if (cellIndex) {
            idx = cellIndex[i];
          } else {
            idx = (curved * rampLast + 0.0001) | 0;
            if (idx > rampLast) idx = rampLast;
            else if (idx < 0) idx = 0;
          }
          let a = curved * 1.1; if (a > 1) a = 1; else if (a < 0) a = 0;
          const o4 = i * 4, o3 = i * 3;
          instPos[o4]     = (c + 0.5) * cw;
          instPos[o4 + 1] = (rr + 0.5) * ch;
          instPos[o4 + 2] = cw;
          instPos[o4 + 3] = ch;
          glyphIdx[i]     = idx;
          color[o3]     = (bgR + (inkR - bgR) * a) / 255;
          color[o3 + 1] = (bgG + (inkG - bgG) * a) / 255;
          color[o3 + 2] = (bgB + (inkB - bgB) * a) / 255;

      // instance count — pass exact-length views when the grow-only
      // buffer is larger than N.
      const ip = instPos.length === N * 4 ? instPos : instPos.subarray(0, N * 4);
      const gi = glyphIdx.length === N ? glyphIdx : glyphIdx.subarray(0, N);
      const cl = color.length === N * 3 ? color : color.subarray(0, N * 3);
      wave6.draw(r, _glCanvas, ip, gi, cl,
                 [bgR / 255, bgG / 255, bgB / 255]);
      drawingContext.drawImage(_glCanvas, 0, 0);

    } catch (e) {
      console.warn('glyph-studio: WebGL path failed, latching CPU fallback:', e);
      _glOk = false;

  function _hexToRgb(hex) {
    if (typeof hex !== 'string') return [0, 0, 0];
    let h = hex.charAt(0) === '#' ? hex.slice(1) : hex;
    if (h.length === 3) h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2];

  // HOT-PATH: drawBrightnessGrid — autonomous optimization loop tracks no

  function drawBrightnessGrid(cellIndex, signal, cols, rows, cellW, cellH) {
    const palette = PALETTES[CONFIG.palette];
    const bgC = color(palette.bg);
    const bgR = red(bgC), bgG = green(bgC), bgB = blue(bgC);
    noStroke();
    textAlign(CENTER, CENTER);
    textSize(CONFIG.font.size);
    textFont(fontFamilyForActive());
    const ramp = RAMPS[CONFIG.ramp];
    const rampLast = ramp.length - 1;
    const gamma = CONFIG.brightnessGamma;
    _buildGammaLut(gamma);
    const gSrc = src;
    const pixels = gSrc.pixels;
    const srcW = gSrc.width;
    const stride = srcW * 4;
    const cellPxW = Math.max(1, Math.floor(cellW));
    const cellPxH = Math.max(1, Math.floor(cellH));

    /* Hoist all per-frame palette/mode parsing OUT of the hot loop.
       Pre-v0.1: applyCellFill called color(palette.inks[0]) on every
       cell — 28,800 hex-parses + p5.Color allocations per frame. Now
       parsed once here, mutated in place by the inline monochrome fast
       path below. ~10× speedup on the per-cell color overhead. */
    const colorMode = CONFIG.colorMode;
    const depthFogActive = GlyphGrid.compat.gateDepthFog(CONFIG);
    const needsSample = (colorMode === 'preserve') || depthFogActive;

    /* Parse ink color ONCE per frame for monochrome/duotone */
    let monoR = 0, monoG = 0, monoB = 0;
    if (colorMode === 'monochrome' && palette.inks && palette.inks[0]) {
      const ic = color(palette.inks[0]);
      monoR = red(ic); monoG = green(ic); monoB = blue(ic);
    }

    /* Hoist duotone inks once per frame.  Pre-this-fix: applyCellFill
       allocated 3 p5.Color objects per cell (color(inks[0]), color(inks[1]),
       lerpColor) → ~86,400 allocs/frame at 240×120.  Now: 6 numbers parsed
       once, inline RGB lerp in the per-cell loop below. */
    let dueR0 = 0, dueG0 = 0, dueB0 = 0, dueR1 = 0, dueG1 = 0, dueB1 = 0;
    if (colorMode === 'duotone' && palette.inks && palette.inks.length > 0) {
      const c0 = color(palette.inks[0]);
      const c1 = color(palette.inks[Math.min(1, palette.inks.length - 1)]);
      dueR0 = red(c0); dueG0 = green(c0); dueB0 = blue(c0);
      dueR1 = red(c1); dueG1 = green(c1); dueB1 = blue(c1);
    }

    /* Build gradient color LUT once per palette/mode/curve change.  Replaces
       28,800 × interpAtU calls per frame (each allocating ~5 objects via
       _blendOne) with a 256-entry Uint8Array lookup. */
    let useGradLut = false;
    if (colorMode === 'gradient') {
      const gStops = resolveGradientStops(palette);
      if (gStops && gStops.length > 0) {
        const gmap = CONFIG.gradientColorMap || {};
        const curveExp = typeof gmap.curve === 'number' ? gmap.curve : 1.0;
        const blendMode = gmap.mode || 'oklab';
        _ensureGradColorLut(gStops, blendMode, curveExp);
        useGradLut = true;
      }
    }

    /* Half-cell offsets pre-computed (used 28,800 times per frame) */
    const halfCellW = cellW * 0.5;
    const halfCellH = cellH * 0.5;

    /* Dispersal — stardust effect.  Per-cell drift + alpha fade across
       a startT → endT window.  Cell positions resolved deterministically
       from (col, row, seed) so frames are coherent.  Cream-paper bg
       cells with space glyphs are exempt via the existing spaceMask
       continue (no extra cost when dispersal is off — basePhase=0
       short-circuits the per-cell branch). */
    const _dispCfg = CONFIG.dispersal || {};
    /* Reduced-motion stills the LIVE dispersal preview; recordings keep
       the effect (explicit user-configured content — policy note at
       __prefersReducedMotion). */
    const _dispRmStill = __prefersReducedMotion() && !(recState && !recState.done);
    const _dispOn = !_dispRmStill && !!(_dispCfg.enabled && _dispCfg.endT > _dispCfg.startT);
    let _dispBasePhase = 0;
    let _dispSwayPhase = 0;
    if (_dispOn) {
      const _dispDur = (CONFIG.animation && CONFIG.animation.duration) || 6;
      const _dispT = recState
        ? (recState.frameIdx / CONFIG.animation.fps)
        : ((frameCount - 1) / CONFIG.animation.fps);
      const _dispNorm = (_dispT % _dispDur) / _dispDur;
      if (_dispNorm >= _dispCfg.startT) {
        const _dispRange = _dispCfg.endT - _dispCfg.startT;
        _dispBasePhase = (_dispNorm - _dispCfg.startT) / _dispRange;

    const _dispUpBias = (_dispCfg.upwardBias != null) ? _dispCfg.upwardBias : 0.7;
    const _dispHorizFactor = 1 - _dispUpBias;
    const _dispDriftScale = (typeof height !== 'undefined' ? height : 600) * (_dispCfg.intensity || 0);
    const _dispSwayScale = (_dispCfg.swayAmount || 0) * 8;
    const _dispRippleAmt = _dispCfg.rippleAmt || 0;
    const _dispRippleSpan = Math.max(0.01, 1 - _dispRippleAmt);
    const _dispSeedBase = (CONFIG.seed | 0) >>> 0;

       v1 scope = the signature path: monochrome + brightness selection +
       no depthFog + no dispersal + NO imgData postproc stage (the
       getImageData readback trap — a GL-composited canvas forces a
       28-50ms GPU→CPU readback, which would regress postproc-heavy;
       Stage 2's FBO chain removes that constraint). Any miss → fall
       through to the unchanged CPU code. Returns/short-circuits only on
       a successful GL draw; _glOk latches false on GL failure. */

        && colorMode === 'monochrome' && !depthFogActive && !_dispActive
        && !(typeof _hasImgDataStages === 'function'
             && _hasImgDataStages(CONFIG.postprocess))) {

                        palette, ramp, rampLast)) {

       inner loop drops from ~57 ms to ~10 ms (about 6× faster). */
    if (colorMode === 'monochrome' && !depthFogActive) {

        ramp, fontFamilyForActive(), CONFIG.font.size, palette.inks[0]
      );
      const ctx = drawingContext;
      const tileW = sprite.tileW, tileH = sprite.tileH;
      const halfTW = sprite.halfW, halfTH = sprite.halfH;
      const spriteCanvas = sprite.canvas;
      const spaceMask = _rampSpriteSpaceMask;
      const prevAlpha = ctx.globalAlpha;
      for (let r = 0; r < rows; r++) {

          const sigQ = sigI < 0 ? 0 : (sigI > 1 ? 1 : sigI);
          const curved = _gammaLut[(sigQ * 255) | 0];
          let idx;
          if (cellIndex) {

            if (idx > rampLast) idx = rampLast;
            else if (idx < 0) idx = 0;

          if (spaceMask[idx]) continue;

          let cy = cy_base;
          /* curved * 1.1 clamped to [0,1], used as globalAlpha. */
          let a = curved * 1.1;

          /* ── Dispersal: per-cell drift + alpha fade ──
             Skipped entirely when basePhase == 0 (frames before startT)
             so the hot path stays fast.  Math: cellRipple delays some

          if (_dispActive) {

    /* Fast path: duotone + no depthFog (sprite-atlas accelerated). */
    if (colorMode === 'duotone' && !depthFogActive && palette.inks && palette.inks.length > 0) {
      const ink0 = palette.inks[0];
      const ink1 = palette.inks[Math.min(1, palette.inks.length - 1)];
      const sprite = _ensureRampDuotoneSprite(ramp, fontFamilyForActive(), CONFIG.font.size, ink0, ink1);
      const ctx = drawingContext;
      const tileW = sprite.tileW, tileH = sprite.tileH;
      const halfTW = sprite.halfW, halfTH = sprite.halfH;
      const spriteCanvas = sprite.canvas;
      const spaceMask = _rampDuotoneSpaceMask;

      for (let r = 0; r < rows; r++) {

            if (idx > rampLast) idx = rampLast;
            else if (idx < 0) idx = 0;

          if (spaceMask[idx]) continue;

          const t = curved < 0 ? 0 : (curved > 1 ? 1 : curved);
          const stepIdx = (t * stepsLast + 0.5) | 0;
          ctx.drawImage(
            spriteCanvas, idx * tileW, stepIdx * tileH, tileW, tileH,

      return;

    if (colorMode === 'gradient' && !depthFogActive && useGradLut) {
      const gStops = resolveGradientStops(palette);
      const gmap = CONFIG.gradientColorMap || {};
      const curveExp = typeof gmap.curve === 'number' ? gmap.curve : 1.0;
      const blendMode = gmap.mode || 'oklab';
      const sprite = _ensureRampGradientSprite(ramp, fontFamilyForActive(), CONFIG.font.size, gStops, blendMode, curveExp);
      const ctx = drawingContext;
      const tileW = sprite.tileW, tileH = sprite.tileH;
      const halfTW = sprite.halfW, halfTH = sprite.halfH;
      const spriteCanvas = sprite.canvas;
      const spaceMask = _rampGradientSpaceMask;
      const stepsLast = sprite.steps - 1;
      for (let r = 0; r < rows; r++) {

        const cy = yBase + halfCellH;

        for (let c = 0; c < cols; c++) {
          const i = rowI + c;
          const sigI = signal[i];
          const sigQ = sigI < 0 ? 0 : (sigI > 1 ? 1 : sigI);
          const curved = _gammaLut[(sigQ * 255) | 0];
          let idx;
          if (cellIndex) {
            idx = cellIndex[i];
          } else {
            idx = (curved * rampLast + 0.0001) | 0;
            if (idx > rampLast) idx = rampLast;
            else if (idx < 0) idx = 0;
          }
          if (spaceMask[idx]) continue;
          const cx = ((c * cellW) | 0) + halfCellW;
          const cClamped = curved < 0 ? 0 : (curved > 1 ? 1 : curved);
          const stepIdx = (cClamped * stepsLast + 0.5) | 0;

      return;

       and depth fog colour blending. */
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const i = r * cols + c;
        const sigI = signal[i];
        const sigQ = sigI < 0 ? 0 : (sigI > 1 ? 1 : sigI);
        const curved = _gammaLut[(sigQ * 255) | 0];
        let ch;
        if (cellIndex) {
          ch = ramp.charAt(cellIndex[i]);

          const idx = (curved * rampLast + 0.0001) | 0;
          ch = ramp.charAt(idx > rampLast ? rampLast : (idx < 0 ? 0 : idx));

        if (needsSample) {
          sampleCellInto(_sampleObj, pixels, stride, x0, y0, cellPxW, cellPxH, srcW, gSrc.height);
        }
        currentCellDepth = cellDepth[i];
        applyCellFill(_sampleObj, palette, curved, bgR, bgG, bgB);
        text(ch, cx, cy);
      }
    }
    currentCellDepth = -1;
  }

  /* Zero-alloc variant of sampleCell — writes into a passed-in object
     rather than returning a new one. Same semantics as sampleCell(). */
  function sampleCellInto(out, pixels, stride, x0, y0, w, h, srcW, srcH) {
    const strategy = CONFIG.samplingStrategy;
    if (strategy === 'nearest') {
      const cx = x0 + (w >> 1);
      const cy = y0 + (h >> 1);

    }

      const cxp = x0 + (w >> 1);

      const xL = x0 < 0 ? 0 : x0;
      const xR = (x0 + w - 1) >= srcW ? srcW - 1 : (x0 + w - 1);
      const yT = y0 < 0 ? 0 : y0;
      const yB = (y0 + h - 1) >= srcH ? srcH - 1 : (y0 + h - 1);
      const lum = (px, py) => {
        const i = py * stride + px * 4;
        return (pixels[i] + pixels[i + 1] + pixels[i + 2]) / 3;
      };
      const tl = lum(xL, yT), tr = lum(xR, yT);
